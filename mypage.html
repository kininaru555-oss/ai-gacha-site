<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>マイページ</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f1115;
      color: #fff;
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
      padding: 16px;
    }

    .top-links {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .top-links a {
      background: #374151;
      color: #fff;
      text-decoration: none;
      text-align: center;
      padding: 12px;
      border-radius: 12px;
      font-weight: bold;
    }

    .card {
      background: #171a21;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .message {
      display: none;
      margin-bottom: 16px;
      background: #101218;
      border-radius: 12px;
      padding: 12px;
      font-size: 13px;
      line-height: 1.7;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .message.show {
      display: block;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 10px;
    }

    .stat {
      background: #101218;
      border-radius: 12px;
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .stat span {
      display: block;
      font-size: 12px;
      color: #aeb5c2;
      margin-bottom: 5px;
    }

    .stat strong {
      font-size: 18px;
    }

    .section-title {
      font-size: 18px;
      margin-bottom: 12px;
      font-weight: bold;
    }

    .sub {
      color: #aeb5c2;
      font-size: 13px;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
    }

    .btn-primary { background: #2563eb; }
    .btn-success { background: #16a34a; }
    .btn-danger { background: #dc2626; }
    .btn-pink { background: #db2777; }
    .btn-gray { background: #4b5563; }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: #101218;
      color: #fff;
      margin-top: 10px;
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .item {
      background: #101218;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 12px;
    }

    .item-grid {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 12px;
    }

    .thumb {
      width: 100%;
      aspect-ratio: 3/4;
      background: #0b0d12;
      border-radius: 12px;
      overflow: hidden;
    }

    .thumb img, .thumb video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .meta {
      color: #cfd6e2;
      font-size: 13px;
      line-height: 1.8;
    }

    .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      background: #263042;
      font-size: 12px;
      font-weight: bold;
    }

    .badge.legend {
      background: #f59e0b;
      color: #111827;
    }

    .badge.power {
      background: #7c3aed;
    }

    .badge.wins {
      background: #16a34a;
    }

    .badge.ball {
      background: #fbbf24;
      color: #111827;
    }

    .stats-mini {
      display: grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .mini-box {
      background: #0b0d12;
      border-radius: 10px;
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .mini-box span {
      display: block;
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 4px;
    }

    .mini-box strong {
      font-size: 14px;
    }

    .ball-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0,1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .ball-cell {
      aspect-ratio: 1;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      border: 1px solid #374151;
      background: #1f2937;
      color: #9ca3af;
    }

    .ball-cell.has {
      background: #f59e0b;
      border-color: #fbbf24;
      color: #111827;
    }

    .empty {
      color: #9ca3af;
      font-size: 14px;
      padding: 8px 0;
    }

    @media (max-width: 720px) {
      .top-links {
        grid-template-columns: repeat(2, minmax(0,1fr));
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0,1fr));
      }

      .item-grid {
        grid-template-columns: 1fr;
      }

      .stats-mini {
        grid-template-columns: repeat(2, minmax(0,1fr));
      }

      .ball-grid {
        grid-template-columns: repeat(4, minmax(0,1fr));
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="top-links">
      <a href="index.html">ガチャ</a>
      <a href="result.html">結果</a>
      <a href="market.html">公開売却</a>
      <a href="upload.html">作品投稿</a>
    </div>

    <div id="systemMessage" class="message"></div>

    <div class="card">
      <div class="section-title">ステータス</div>
      <div class="stats">
        <div class="stat"><span>ポイント</span><strong id="pointsText">0</strong></div>
        <div class="stat"><span>EXP</span><strong id="expText">0</strong></div>
        <div class="stat"><span>レベル</span><strong id="levelText">1</strong></div>
        <div class="stat"><span>無料回数</span><strong id="freeDrawText">0</strong></div>
        <div class="stat"><span>復活アイテム</span><strong id="reviveText">0</strong></div>
        <div class="stat"><span>ボウル</span><strong id="ballText">0 / 7</strong></div>
      </div>

      <div class="actions">
        <button id="buyReviveButton" class="btn-success" type="button">復活アイテムを購入（100pt）</button>
        <button id="adXpButton" class="btn-pink" type="button">広告を見てEXP +20</button>
      </div>

      <input id="withdrawInput" type="number" min="1000" placeholder="出金希望額（1,000pt以上）" />
      <div class="actions">
        <button id="withdrawButton" class="btn-primary" type="button">出金申請</button>
      </div>
    </div>

    <div class="card">
      <div class="section-title">トラゴンボウル</div>
      <div class="sub">
        7種すべて集めると、所有カード1枚をレジェンド化できます。
      </div>
      <div id="ballGrid" class="ball-grid"></div>
    </div>

    <div class="card">
      <div class="section-title">届いたオファー</div>
      <div id="incomingOffers" class="list"></div>
    </div>

    <div class="card">
      <div class="section-title">送ったオファー</div>
      <div id="outgoingOffers" class="list"></div>
    </div>

    <div class="card">
      <div class="section-title">所有カード</div>
      <div class="sub" style="margin-bottom:12px;">
        所有カードの一覧です。育成済みカードはマーケットでそのまま売買されます。バトル・売却・レジェンド化ができます。
      </div>
      <div id="myWorks" class="list"></div>
    </div>

    <div class="card">
      <div class="section-title">バトル履歴</div>
      <div id="battleLogs" class="list"></div>
    </div>

  </div>

  <script src="config.js"></script>
  <script>
    const API_BASE = window.APP_CONFIG.API_BASE;
    const AUTH_STORAGE_KEY = window.APP_CONFIG.AUTH_STORAGE_KEY;

    const systemMessage = document.getElementById("systemMessage");
    const pointsText = document.getElementById("pointsText");
    const expText = document.getElementById("expText");
    const levelText = document.getElementById("levelText");
    const freeDrawText = document.getElementById("freeDrawText");
    const reviveText = document.getElementById("reviveText");
    const ballText = document.getElementById("ballText");

    const incomingOffers = document.getElementById("incomingOffers");
    const outgoingOffers = document.getElementById("outgoingOffers");
    const myWorks = document.getElementById("myWorks");
    const battleLogs = document.getElementById("battleLogs");
    const ballGrid = document.getElementById("ballGrid");

    let authUser = null;
    let currentBallCount = 0;

    function readAuth() {
      try {
        const raw = localStorage.getItem(AUTH_STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }

    function showMessage(text) {
      systemMessage.textContent = text;
      systemMessage.classList.add("show");
    }

    function clearMessage() {
      systemMessage.textContent = "";
      systemMessage.classList.remove("show");
    }

    async function api(path, options = {}) {
      const res = await fetch(`${API_BASE}${path}`, {
        headers: {
          "Content-Type": "application/json",
          ...(options.headers || {})
        },
        ...options
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data.detail || "APIエラー");
      }
      return data;
    }

    async function loadUser() {
      const data = await api(`/users/${encodeURIComponent(authUser.user_id)}`);
      pointsText.textContent = data.points ?? 0;
      expText.textContent = data.exp ?? 0;
      levelText.textContent = data.level ?? 1;
      freeDrawText.textContent = data.free_draw_count ?? 0;
      reviveText.textContent = data.revive_item_count ?? 0;
      currentBallCount = data.ball_count ?? 0;
      ballText.textContent = `${currentBallCount} / 7`;
    }

    async function loadBalls() {
      const data = await api(`/balls/${encodeURIComponent(authUser.user_id)}`);
      const ownedCodes = new Set((data.items || []).map(item => String(item.ball_code || "")));

      const cells = [];
      for (let i = 1; i <= 7; i++) {
        const key = `BALL_${i}`;
        const has = ownedCodes.has(key) || ownedCodes.has(String(i));
        cells.push(`
          <div class="ball-cell ${has ? "has" : ""}">
            ${i}
          </div>
        `);
      }

      ballGrid.innerHTML = cells.join("");
    }

    function renderIncoming(items) {
      if (!items.length) {
        incomingOffers.innerHTML = `<div class="empty">オファーはありません。</div>`;
        return;
      }

      incomingOffers.innerHTML = items.map(item => `
        <div class="item">
          <div class="title">${escapeHtml(item.work_title)}</div>
          <div class="meta">
            差出人: ${escapeHtml(item.from_user)}<br>
            オファーpt: ${item.points}<br>
            状態: ${escapeHtml(item.status)}
          </div>
          ${item.status === "pending" ? `
            <div class="actions">
              <button class="btn-success" onclick="acceptOffer(${item.id})" type="button">承認</button>
              <button class="btn-danger" onclick="rejectOffer(${item.id})" type="button">拒否</button>
            </div>
          ` : ""}
        </div>
      `).join("");
    }

    function renderOutgoing(items) {
      if (!items.length) {
        outgoingOffers.innerHTML = `<div class="empty">送信したオファーはありません。</div>`;
        return;
      }

      outgoingOffers.innerHTML = items.map(item => `
        <div class="item">
          <div class="title">${escapeHtml(item.work_title)}</div>
          <div class="meta">
            宛先: ${escapeHtml(item.to_user)}<br>
            オファーpt: ${item.points}<br>
            状態: ${escapeHtml(item.status)}
          </div>
        </div>
      `).join("");
    }

    function calcCardPower(item) {
      return (
        Number(item.hp || 0) +
        Number(item.atk || 0) +
        Number(item.def || 0) +
        Number(item.spd || 0) +
        Number(item.luk || 0)
      );
    }

    function renderWorks(items) {
      const filtered = (items || []).filter(item => !item.is_ball);

      if (!filtered.length) {
        myWorks.innerHTML = `<div class="empty">所有カードはありません。</div>`;
        return;
      }

      myWorks.innerHTML = filtered.map(item => {
        const power = calcCardPower(item);
        const canLegend = !item.is_legend && currentBallCount >= 7;

        return `
          <div class="item">
            <div class="item-grid">
              <div class="thumb">
                ${item.video_url
                  ? `<video src="${escapeAttr(item.video_url)}" muted playsinline preload="metadata"></video>`
                  : `<img src="${escapeAttr(item.image_url || "")}" alt="${escapeAttr(item.title)}" />`
                }
              </div>
              <div>
                <div class="badge-row">
                  <div class="badge">${escapeHtml(item.rarity || "N")}</div>
                  ${item.is_legend ? `<div class="badge legend">LEGEND</div>` : ""}
                  <div class="badge">Lv ${item.level ?? 1}</div>
                  <div class="badge wins">勝利 ${item.win_count ?? 0}</div>
                  <div class="badge power">戦闘力 ${power}</div>
                </div>

                <div class="title">${escapeHtml(item.title)}</div>

                <div class="meta">
                  作者: ${escapeHtml(item.creator_name || "不明")}<br>
                  HP ${item.hp} / ATK ${item.atk} / DEF ${item.def}<br>
                  SPD ${item.spd} / LUK ${item.luk}<br>
                  現在EXP ${item.exp ?? 0} / 累計EXP ${item.total_exp ?? 0}<br>
                  勝利 ${item.win_count ?? 0} / 総バトル ${item.battle_count ?? 0}<br>
                  連敗 ${item.lose_streak_count ?? 0} / 総排出 ${item.draw_count ?? 0}
                </div>

                <div class="stats-mini">
                  <div class="mini-box">
                    <span>HP</span>
                    <strong>${item.hp ?? 0}</strong>
                  </div>
                  <div class="mini-box">
                    <span>ATK</span>
                    <strong>${item.atk ?? 0}</strong>
                  </div>
                  <div class="mini-box">
                    <span>DEF</span>
                    <strong>${item.def ?? 0}</strong>
                  </div>
                  <div class="mini-box">
                    <span>SPD</span>
                    <strong>${item.spd ?? 0}</strong>
                  </div>
                  <div class="mini-box">
                    <span>LUK</span>
                    <strong>${item.luk ?? 0}</strong>
                  </div>
                  <div class="mini-box">
                    <span>戦闘力</span>
                    <strong>${power}</strong>
                  </div>
                </div>

                <div class="actions">
                  <button class="btn-primary" onclick="battleCard(${item.work_id})" type="button">バトル</button>
                  <button class="btn-success" onclick="listCard(${item.work_id})" type="button">公開売却</button>
                  ${
                    item.is_legend
                      ? `<button class="btn-gray" type="button" disabled>レジェンド済み</button>`
                      : canLegend
                        ? `<button class="btn-pink" onclick="legendCard(${item.work_id})" type="button">レジェンド化</button>`
                        : `<button class="btn-gray" type="button" disabled>ボウル7個で解放</button>`
                  }
                </div>
              </div>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderBattles(items) {
      if (!items.length) {
        battleLogs.innerHTML = `<div class="empty">バトル履歴はありません。</div>`;
        return;
      }

      battleLogs.innerHTML = items.map(item => `
        <div class="item">
          <div class="title">${escapeHtml(String(item.result).toUpperCase())} / 相手: ${escapeHtml(item.opponent_name || "-")}</div>
          <div class="meta">
            ${escapeHtml(item.log || "")}<br>
            EXP +${item.reward_exp}<br>
            ${escapeHtml(item.created_at || "")}
          </div>
        </div>
      `).join("");
    }

    async function loadOffers() {
      const data = await api(`/offers/${encodeURIComponent(authUser.user_id)}`);
      renderIncoming(data.incoming || []);
      renderOutgoing(data.outgoing || []);
    }

    async function loadWorks() {
      const data = await api(`/users/${encodeURIComponent(authUser.user_id)}/works`);
      renderWorks(data.works || []);
    }

    async function loadBattles() {
      const data = await api(`/battle/logs/${encodeURIComponent(authUser.user_id)}`);
      renderBattles(data.logs || []);
    }

    async function refreshAll() {
      clearMessage();
      try {
        await Promise.all([
          loadUser(),
          loadOffers(),
          loadBattles(),
          loadBalls()
        ]);
        await loadWorks();
      } catch (error) {
        showMessage(error.message || "データの読み込みに失敗しました。通信状況を確認してから再読み込みしてください。");
      }
    }

    async function acceptOffer(id) {
      try {
        const data = await api(`/offers/${id}/accept`, { method: "POST" });
        showMessage(data.message || "オファーを承認しました。");
        await refreshAll();
      } catch (error) {
        showMessage(error.message);
      }
    }

    async function rejectOffer(id) {
      try {
        const data = await api(`/offers/${id}/reject`, { method: "POST" });
        showMessage(data.message || "オファーを拒否しました。");
        await refreshAll();
      } catch (error) {
        showMessage(error.message);
      }
    }

    async function battleCard(workId) {
      try {
        const data = await api(`/battle/entry`, {
          method: "POST",
          body: JSON.stringify({
            user_id: authUser.user_id,
            work_id: workId
          })
        });
        showMessage(data.message || "バトルに参加しました！");
        await refreshAll();
      } catch (error) {
        showMessage(error.message);
      }
    }

    async function listCard(workId) {
      const price = prompt("出品価格を入力してください（pt単位・最低1pt）", "100");
      if (!price) return;

      const numericPrice = Number(price);
      if (!Number.isFinite(numericPrice) || numericPrice < 1) {
        showMessage("出品価格は1pt以上で入力してください。");
        return;
      }

      try {
        const data = await api(`/market/list`, {
          method: "POST",
          body: JSON.stringify({
            user_id: authUser.user_id,
            work_id: workId,
            price_points: numericPrice
          })
        });
        showMessage(data.message || "マーケットに出品しました！");
      } catch (error) {
        showMessage(error.message);
      }
    }

    async function legendCard(workId) {
      if (currentBallCount < 7) {
        showMessage("レジェンド化にはトラゴンボウル7個が必要です。");
        return;
      }

      try {
        const data = await api(`/legend/activate`, {
          method: "POST",
          body: JSON.stringify({
            user_id: authUser.user_id,
            work_id: workId
          })
        });
        showMessage(data.message || "レジェンド化しました！");
        await refreshAll();
      } catch (error) {
        showMessage(error.message);
      }
    }

    async function buyRevive() {
      try {
        const data = await api(`/items/revive/buy`, {
          method: "POST",
          body: JSON.stringify({ user_id: authUser.user_id })
        });
        showMessage(data.message || "復活アイテムを購入しました！");
        await refreshAll();
      } catch (error) {
        showMessage(error.message);
      }
    }

    async function getAdXp() {
      try {
        const data = await api(`/rewards/ad-xp`, {
          method: "POST",
          body: JSON.stringify({ user_id: authUser.user_id })
        });
        showMessage(data.message || "広告報酬を受け取りました！EXP +20");
        await refreshAll();
      } catch (error) {
        showMessage(error.message);
      }
    }

    async function withdrawRequest() {
      const amount = Number(document.getElementById("withdrawInput"
