<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIガチャ 作者ランキング</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .creator-meta {
      color: #ccc;
      line-height: 1.8;
      font-size: 14px;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="toplink" href="index.html">← ガチャに戻る</a>
    <a class="toplink" href="ranking.html">人気ランキング</a>

    <div class="hero">
      <h1>作者ランキング</h1>
      <p class="sub">作者ごとの合計いいね数で表示しています</p>
    </div>

    <div id="creatorRanking" class="grid"></div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzWLUWKFwRJjIa6QVN8XPr7xRLFfTxmI34XBYb80yvIaDuxzzDR5caWnWEB8KQTUe4E4Q/exec";

    async function loadCreatorRanking() {
      try {
        const res = await fetch(API_URL + "?t=" + Date.now(), { cache: "no-store" });

        if (!res.ok) {
          throw new Error("API取得失敗: " + res.status);
        }

        const raw = await res.json();
        const data = Array.isArray(raw) ? raw : (raw.items || []);

        const creatorMap = {};

        data.forEach((item) => {
          const creator = item.creator || "投稿者";
          const likeCount = Number(item.likes || 0);

          if (!creatorMap[creator]) {
            creatorMap[creator] = {
              creator: creator,
              totalLikes: 0,
              workCount: 0,
              link: item.link || "#"
            };
          }

          creatorMap[creator].totalLikes += likeCount;
          creatorMap[creator].workCount += 1;

          if (
            (!creatorMap[creator].link || creatorMap[creator].link === "#") &&
            item.link &&
            item.link !== "#"
          ) {
            creatorMap[creator].link = item.link;
          }
        });

        const creators = Object.values(creatorMap).sort((a, b) => {
          if (b.totalLikes !== a.totalLikes) {
            return b.totalLikes - a.totalLikes;
          }
          return b.workCount - a.workCount;
        });

        const container = document.getElementById("creatorRanking");
        container.innerHTML = "";

        if (!creators.length) {
          container.innerHTML = "<div class='card'>まだ作者データがありません。</div>";
          return;
        }

        creators.forEach((creator, i) => {
          const card = document.createElement("div");
          card.className = "card";

          const linkHtml =
            creator.link && creator.link !== "#"
              ? `<a class="creator-link" href="${creator.link}" target="_blank" rel="noopener noreferrer">作品リンクへ</a>`
              : "";

          card.innerHTML = `
            <div class="rank">#${i + 1}</div>
            <div class="name">${creator.creator}</div>
            <div class="creator-meta">
              合計いいね: ❤️ ${creator.totalLikes}<br>
              作品数: ${creator.workCount}
            </div>
            ${linkHtml}
          `;

          container.appendChild(card);
        });
      } catch (e) {
        console.error(e);
        document.getElementById("creatorRanking").innerHTML =
          "<div class='card'>作者ランキングを読み込めませんでした。</div>";
      }
    }

    loadCreatorRanking();
  </script>
</body>
</html>
