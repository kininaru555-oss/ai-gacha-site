<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIガチャ 作者ランキング</title>
  <style>
    body {
      font-family: sans-serif;
      background: #111;
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 30px;
    }

    .toplink {
      display: inline-block;
      margin-bottom: 20px;
      margin-right: 8px;
      color: #fff;
      text-decoration: none;
      background: #444;
      padding: 8px 14px;
      border-radius: 8px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: #222;
      padding: 16px;
      border-radius: 12px;
      text-align: left;
    }

    .rank {
      font-size: 20px;
      font-weight: bold;
      color: #ffcc66;
      margin-bottom: 8px;
    }

    .name {
      font-size: 18px;
      margin-bottom: 8px;
      word-break: break-word;
    }

    .meta {
      color: #ccc;
      line-height: 1.8;
    }

    .creator-link {
      display: inline-block;
      margin-top: 10px;
      color: #fff;
      text-decoration: none;
      background: #0b57d0;
      padding: 8px 12px;
      border-radius: 8px;
    }
  </style>
</head>
