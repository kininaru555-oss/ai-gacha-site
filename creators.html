<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>クリエイターランキング | 権利台帳</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="ranking-wrap">
    <header class="ranking-header">
      <h1 class="ranking-title">クリエイターランキング</h1>
      <p class="ranking-subtitle">
        権利台帳上の流通実績にもとづくクリエイターランキングです。<br>
        いいね数ではなく、移転価格・移転件数・最高移転価格で表示します。
      </p>

      <div class="ranking-links">
        <a href="/">トップへ戻る</a>
        <a class="secondary" href="/ranking">売上ランキングへ</a>
      </div>
    </header>

    <main id="rankingList" class="ranking-list">
      <div class="ranking-empty">読み込み中...</div>
    </main>
  </div>

  <script>
    const API_BASE = "https://aicontents.onrender.com";

    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function renderEmpty(message) {
      const list = document.getElementById("rankingList");
      list.innerHTML = `<div class="ranking-empty">${escapeHtml(message)}</div>`;
    }

    function renderRanking(items) {
      const list = document.getElementById("rankingList");

      if (!Array.isArray(items) || !items.length) {
        renderEmpty("まだクリエイターランキングはありません。");
        return;
      }

      list.innerHTML = items.map((item, index) => {
        const rank = index + 1;
        const creator = item.creator || item.author || "不明";
        const totalSales = Number(item.total_sales || 0);
        const soldCount = Number(item.sold_count || 0);
        const maxSale = Number(item.max_sale || 0);

        return `
          <article class="ranking-card ranking-card-creator">
            <div class="ranking-rank">#${rank}</div>
            <div class="ranking-body">
              <div class="ranking-name">${escapeHtml(creator)}</div>
              <div class="ranking-meta">
                累計移転価格: ${totalSales}pt<br>
                移転件数: ${soldCount}件<br>
                最高移転価格: ${maxSale}pt
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    async function loadCreatorRanking() {
      try {
        const res = await fetch(`${API_BASE}/api/ranking/creators`, {
          cache: "no-store"
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.detail || "クリエイターランキングの取得に失敗しました");
        }

        renderRanking(data.items || []);
      } catch (error) {
        console.error(error);
        renderEmpty("クリエイターランキングの読み込みに失敗しました。");
      }
    }

    loadCreatorRanking();
  </script>
</body>
</html>
