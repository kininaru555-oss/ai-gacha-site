<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIガチャ 作者ランキング</title>
  <style>
    body {
      font-family: sans-serif;
      background: #111;
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 30px;
    }

    .toplink {
      display: inline-block;
      margin-bottom: 20px;
      margin-right: 8px;
      color: #fff;
      text-decoration: none;
      background: #444;
      padding: 8px 14px;
      border-radius: 8px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: #222;
      padding: 16px;
      border-radius: 12px;
      text-align: left;
    }

    .rank {
      font-size: 20px;
      font-weight: bold;
      color: #ffcc66;
      margin-bottom: 8px;
    }

    .name {
      font-size: 18px;
      margin-bottom: 8px;
      word-break: break-word;
    }

    .meta {
      color: #ccc;
      line-height: 1.8;
    }

    .creator-link {
      display: inline-block;
      margin-top: 10px;
      color: #fff;
      text-decoration: none;
      background: #0b57d0;
      padding: 8px 12px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <a class="toplink" href="index.html">← ガチャに戻る</a>
  <a class="toplink" href="ranking.html">人気ランキング</a>

  <h1>作者ランキング</h1>

  <div id="creatorRanking" class="grid"></div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxh7CW4kVBf1gjBbGzSTq-G8cUEpQ-06347Wlzk2m1VZFPDHgP-JWDWiPVAtCdjvBD1Xw/exec";

    function getLikes() {
      const raw = localStorage.getItem("likes");
      return raw ? JSON.parse(raw) : {};
    }

    function getWorkId(work) {
      return (work.title || "") + "_" + (work.creator || "");
    }

    async function loadCreatorRanking() {
      try {
        const res = await fetch(API_URL, { cache: "no-store" });

        if (!res.ok) {
          throw new Error("API取得失敗: " + res.status);
        }

        const data = await res.json();
        const likes = getLikes();

        const creatorMap = {};

        data.forEach((item) => {
          const creator = item.creator || "投稿者";
          const id = getWorkId(item);
          const likeCount = likes[id] || 0;

          if (!creatorMap[creator]) {
            creatorMap[creator] = {
              creator: creator,
              totalLikes: 0,
              workCount: 0,
              link: item.link || "#"
            };
          }

          creatorMap[creator].totalLikes += likeCount;
          creatorMap[creator].workCount += 1;

          if (
            (!creatorMap[creator].link || creatorMap[creator].link === "#") &&
            item.link &&
            item.link !== "#"
          ) {
            creatorMap[creator].link = item.link;
          }
        });

        const creators = Object.values(creatorMap).sort((a, b) => {
          if (b.totalLikes !== a.totalLikes) {
            return b.totalLikes - a.totalLikes;
          }
          return b.workCount - a.workCount;
        });

        const container = document.getElementById("creatorRanking");
        container.innerHTML = "";

        if (!creators.length) {
          container.innerHTML = "<p>まだ作者データがありません。</p>";
          return;
        }

        creators.forEach((creator, i) => {
          const card = document.createElement("div");
          card.className = "card";

          const linkHtml =
            creator.link && creator.link !== "#"
              ? `<a class="creator-link" href="${creator.link}" target="_blank" rel="noopener noreferrer">作品リンクへ</a>`
              : "";

          card.innerHTML = `
            <div class="rank">#${i + 1}</div>
            <div class="name">${creator.creator}</div>
            <div class="meta">
              合計いいね: ❤️ ${creator.totalLikes}<br>
              作品数: ${creator.workCount}
            </div>
            ${linkHtml}
          `;

          container.appendChild(card);
        });

      } catch (e) {
        console.error(e);
        document.getElementById("creatorRanking").innerHTML =
          "<p>作者ランキングを読み込めませんでした。</p>";
      }
    }

    loadCreatorRanking();
  </script>
</body>
</html>
