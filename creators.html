<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>クリエイターランキング | 権利台帳</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    .ranking-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 16px 60px;
    }

    .ranking-header {
      margin-bottom: 24px;
    }

    .ranking-title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .ranking-subtitle {
      color: #bdbdbd;
      line-height: 1.7;
      font-size: 14px;
    }

    .ranking-list {
      display: grid;
      gap: 14px;
    }

    .ranking-card {
      background: #1f1f1f;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.16);
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 14px;
      align-items: center;
    }

    .ranking-rank {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #2a2a2a;
      color: #fff;
      font-size: 24px;
      font-weight: bold;
    }

    .ranking-body {
      min-width: 0;
    }

    .ranking-name {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 8px;
      word-break: break-word;
    }

    .ranking-meta {
      color: #d0d0d0;
      font-size: 14px;
      line-height: 1.8;
    }

    .ranking-empty {
      background: #1f1f1f;
      border-radius: 16px;
      padding: 18px;
      color: #bdbdbd;
    }

    .ranking-links {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .ranking-links a {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 10px;
      background: #7b61ff;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
    }

    .ranking-links a.secondary {
      background: #444;
    }
  </style>
</head>
<body>
  <div class="ranking-wrap">
    <header class="ranking-header">
      <h1 class="ranking-title">クリエイターランキング</h1>
      <p class="ranking-subtitle">
        現在の権利台帳上で、作品の流通実績が高いクリエイターのランキングです。
      </p>

      <div class="ranking-links">
        <a href="/">トップへ戻る</a>
        <a class="secondary" href="/ranking">売上ランキングへ</a>
      </div>
    </header>

    <main id="rankingList" class="ranking-list">
      <div class="ranking-empty">読み込み中...</div>
    </main>
  </div>

  <script>
    const API_BASE = "https://aicontents.onrender.com";

    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function renderEmpty(message) {
      const list = document.getElementById("rankingList");
      list.innerHTML = `<div class="ranking-empty">${escapeHtml(message)}</div>`;
    }

    function renderRanking(items) {
      const list = document.getElementById("rankingList");

      if (!Array.isArray(items) || !items.length) {
        renderEmpty("まだクリエイターランキングはありません。");
        return;
      }

      list.innerHTML = items.map((item, index) => {
        const rank = index + 1;
        const creator = item.creator || item.author || "不明";
        const totalSales = Number(item.total_sales || 0);
        const soldCount = Number(item.sold_count || 0);
        const topSale = Number(item.max_sale || 0);

        return `
          <article class="ranking-card">
            <div class="ranking-rank">#${rank}</div>
            <div class="ranking-body">
              <div class="ranking-name">${escapeHtml(creator)}</div>
              <div class="ranking-meta">
                累計移転価格: ${totalSales}pt<br>
                移転件数: ${soldCount}件<br>
                最高移転価格: ${topSale}pt
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    async function loadCreatorRanking() {
      try {
        const res = await fetch(`${API_BASE}/api/ranking/creators`, {
          cache: "no-store"
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.detail || "クリエイターランキングの取得に失敗しました");
        }

        renderRanking(data.items || []);
      } catch (error) {
        console.error(error);
        renderEmpty("クリエイターランキングの読み込みに失敗しました。");
      }
    }

    loadCreatorRanking();
  </script>
</body>
</html>
