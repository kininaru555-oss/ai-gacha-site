<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作品投稿</title>

  <!-- Cloudinary Widget -->
  <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
  <!-- DOMPurify（XSS対策） -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>
  <script src="config.js"></script>

  <style>
    /* （元のスタイルは完全にそのまま保持） */
    * { box-sizing: border-box; }
    body { margin: 0; font-family: sans-serif; background: #0f1115; color: #fff; }
    .container { max-width: 560px; margin: 0 auto; padding: 16px; }
    .card { background: #171a21; border-radius: 16px; padding: 16px; margin-bottom: 16px; }
    h2 { margin-top: 0; }
    input, textarea, select {
      width: 100%; padding: 12px; border-radius: 10px; border: 1px solid transparent;
      margin-bottom: 10px; background: #101218; color: #fff; outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    input:focus, textarea:focus, select:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.18); }
    input:invalid, textarea:invalid, select:invalid { border-color: #ef4444; }
    button, .btn-nav {
      width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold;
      cursor: pointer; margin-bottom: 10px; color: #fff;
    }
    .btn-upload { background: #2563eb; }
    .btn-auto { background: #7c3aed; }
    .btn-hash { background: #0f766e; }
    .btn-submit { background: #16a34a; }
    .btn-nav { background: #374151; }
    .preview { width: 100%; aspect-ratio: 3/4; background: #0b0d12; border-radius: 12px; overflow: hidden; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.06); }
    .preview img, .preview video { width: 100%; height: 100%; object-fit: cover; }
    .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 12px 0; }
    .message { background: #101218; padding: 10px; border-radius: 10px; margin-top: 10px; display: none; border: 1px solid rgba(255,255,255,0.08); }
    .message.show { display: block; }
    .message.error { color: #ff6b6b; border-color: #ff6b6b; }
    .message.success { color: #4ade80; border-color: #4ade80; }
    .message.info { color: #93c5fd; border-color: #60a5fa; }
    #loading { display: none; text-align: center; padding: 20px; color: #9ca3af; }
    .required-badge { font-size: 11px; padding: 2px 6px; border-radius: 999px; background: rgba(239,68,68,0.18); color: #fca5a5; margin-left: 6px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>作品投稿</h2>

      <form id="postForm" novalidate>
        <div class="preview" id="preview">
          <div class="preview-placeholder">画像または動画をアップロードしてください</div>
        </div>

        <button class="btn-upload" id="uploadBtn" type="button">画像／動画アップロード</button>
        <button class="btn-auto" id="autoStatButton" type="button" disabled>画像から自動ステータス生成</button>
        <button class="btn-hash" id="hashButton" type="button" disabled>コンテンツハッシュ自動生成</button>

        <div id="loading">処理中...</div>

        <!-- ラベル付きに統一（アクセシビリティ向上） -->
        <div>
          <label for="userId">ユーザーID <span class="required-badge">必須</span></label>
          <input id="userId" readonly required>
        </div>
        <div>
          <label for="creatorName">投稿者名（表示名） <span class="required-badge">必須</span></label>
          <input id="creatorName" required maxlength="50">
        </div>
        <div>
          <label for="title">タイトル <span class="required-badge">必須</span></label>
          <input id="title" required maxlength="100">
        </div>
        <div>
          <label for="description">説明（任意）</label>
          <textarea id="description" maxlength="1000" rows="4"></textarea>
        </div>
        <div>
          <label for="genre">ジャンル（例: ファンタジー、日常）</label>
          <input id="genre" maxlength="50">
        </div>

        <div class="stats-grid">
          <div class="stat-input"><label for="hp">HP</label><input id="hp" type="number" min="1" max="999"></div>
          <div class="stat-input"><label for="atk">ATK</label><input id="atk" type="number" min="1" max="999"></div>
          <div class="stat-input"><label for="def">DEF</label><input id="def" type="number" min="1" max="999"></div>
          <div class="stat-input"><label for="spd">SPD</label><input id="spd" type="number" min="1" max="999"></div>
          <div class="stat-input"><label for="luk">LUK</label><input id="luk" type="number" min="1" max="999"></div>
        </div>

        <div>
          <label for="rarity">レア度 <span class="required-badge">必須</span></label>
          <select id="rarity" required>
            <option value="">選択してください</option>
            <option value="N">N</option>
            <option value="R">R</option>
            <option value="SR">SR</option>
            <option value="SSR">SSR</option>
          </select>
        </div>

        <div><label for="linkUrl">作者ページURL（任意）</label><input id="linkUrl" type="url"></div>
        <div><label for="xUrl">X URL（任意）</label><input id="xUrl" type="url"></div>
        <div><label for="boothUrl">BOOTH URL（任意）</label><input id="boothUrl" type="url"></div>
        <div><label for="chichipuiUrl">ちちぷい URL（任意）</label><input id="chichipuiUrl" type="url"></div>
        <div><label for="dlsiteUrl">DLsite URL（任意）</label><input id="dlsiteUrl" type="url"></div>

        <div>
          <label for="contentHash">コンテンツハッシュ <span class="required-badge">必須</span></label>
          <input id="contentHash" readonly required>
        </div>

        <div class="small-note">
          画像アップロード後に「自動ステータス生成」を押すと自動入力できます。<br>
          動画投稿では自動ステータス生成は無効です。
        </div>

        <button class="btn-submit" id="submitBtn" type="submit">投稿する</button>
        <div id="msg" class="message"></div>
      </form>

      <a href="index.html" class="btn-nav">戻る</a>
    </div>
  </div>

  <script>
    const API_BASE = window.APP_CONFIG?.API_BASE || "";
    const APPS_SCRIPT_URL = window.APP_CONFIG?.APPS_SCRIPT_URL || "";
    const AUTH_STORAGE_KEY = window.APP_CONFIG?.AUTH_STORAGE_KEY || "auth";
    const CLOUDINARY_CLOUD_NAME = window.APP_CONFIG?.CLOUDINARY_CLOUD_NAME || "";
    const CLOUDINARY_UPLOAD_PRESET = window.APP_CONFIG?.CLOUDINARY_UPLOAD_PRESET || "";

    let uploadedAsset = null;
    let isSubmitting = false;

    const form = document.getElementById("postForm");
    const preview = document.getElementById("preview");
    const loading = document.getElementById("loading");
    const uploadBtn = document.getElementById("uploadBtn");
    const autoStatButton = document.getElementById("autoStatButton");
    const hashButton = document.getElementById("hashButton");
    const submitBtn = document.getElementById("submitBtn");

    // ====================== セキュリティ関数 ======================
    function safeAttr(str) {
      return DOMPurify.sanitize(String(str || ""), { ALLOWED_TAGS: [] });
    }
    function safeText(str) {
      return DOMPurify.sanitize(String(str || ""), { ALLOWED_TAGS: [] });
    }

    function val(id) { const el = document.getElementById(id); return el ? el.value.trim() : ""; }
    function setVal(id, value) { const el = document.getElementById(id); if (el) el.value = value ?? ""; }

    function numOrDefault(id, fallback) {
      const n = Number(val(id));
      return Number.isInteger(n) && n > 0 ? n : fallback;
    }

    function showMessage(text, type = "success") {
      const m = document.getElementById("msg");
      m.textContent = text;
      m.className = `message show ${type}`;
    }
    function clearMessage() {
      const m = document.getElementById("msg");
      m.textContent = "";
      m.className = "message";
    }
    function setLoading(isLoading, text = "処理中...") {
      loading.style.display = isLoading ? "block" : "none";
      loading.textContent = text;
    }

    function getAuthObject() {
      try {
        const raw = localStorage.getItem(AUTH_STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch { return null; }
    }

    function getAuthHeaders() {
      const auth = getAuthObject();
      const token = auth?.access_token || auth?.token || auth?.id_token || "";
      return {
        "Content-Type": "application/json",
        ...(token && { Authorization: `Bearer ${token}` })
      };
    }

    function loadAuthUser() {
      const auth = getAuthObject();
      if (!auth?.user_id) {
        showMessage("ログイン情報が見つかりません。先にログインしてください。", "error");
        submitBtn.disabled = uploadBtn.disabled = true;
        return;
      }
      setVal("userId", auth.user_id);
    }

    function updateActionButtons() {
      const isUploaded = !!uploadedAsset;
      hashButton.disabled = !isUploaded;
      autoStatButton.disabled = !(isUploaded && uploadedAsset.resource_type === "image");
    }

    function getVideoPosterUrl(asset) {
      if (!asset) return "";
      if (asset.thumbnail_url) return asset.thumbnail_url;
      return asset.secure_url ? asset.secure_url.replace(/\.[a-zA-Z0-9]+(\?.*)?$/, ".jpg") : "";
    }

    function renderPreview() {
      if (!uploadedAsset) {
        preview.innerHTML = `<div class="preview-placeholder">画像または動画をアップロードしてください</div>`;
        return;
      }
      const src = safeAttr(uploadedAsset.secure_url);
      const poster = safeAttr(getVideoPosterUrl(uploadedAsset));

      if (uploadedAsset.resource_type === "video") {
        preview.innerHTML = `<video src="${src}" controls playsinline preload="metadata" \( {poster ? `poster=" \){poster}"` : ""}></video>`;
      } else {
        preview.innerHTML = `<img src="${src}" alt="プレビュー">`;
      }
    }

    // ====================== ハッシュ生成 ======================
    async function sha256Hex(text) {
      const hashBuffer = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
      return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, "0")).join("");
    }

    // ====================== Cloudinary Widget ======================
    const widget = cloudinary.createUploadWidget({
      cloudName: CLOUDINARY_CLOUD_NAME,
      uploadPreset: CLOUDINARY_UPLOAD_PRESET,
      resourceType: "auto",
      maxFiles: 1,
      clientAllowedFormats: ["jpg","jpeg","png","webp","mp4","webm","mov"],
      maxFileSize: 10000000,
      multiple: false,
      sources: ["local", "camera"],
      folder: "ai_gacha_posts"
    }, (error, result) => {
      if (error) return showMessage("アップロードエラー: " + (error.message || "不明"), "error");
      if (result?.event === "success") {
        uploadedAsset = result.info;
        renderPreview();
        updateActionButtons();
        showMessage(uploadedAsset.resource_type === "video" ? "動画アップロード完了（自動ステータスは無効）" : "アップロード完了！ ハッシュを生成してください", "success");
      }
    });

    uploadBtn.addEventListener("click", () => { clearMessage(); widget.open(); });

    // ====================== ハッシュ自動生成 ======================
    hashButton.addEventListener("click", async () => {
      if (!uploadedAsset) return showMessage("先にアップロードしてください", "error");
      const base = [uploadedAsset.public_id || "", uploadedAsset.secure_url || "", uploadedAsset.resource_type || "", val("title"), val("creatorName"), val("userId")].join("|");
      const hash = await sha256Hex(base);
      setVal("contentHash", hash);
      showMessage("コンテンツハッシュを自動生成しました", "success");
    });

    // ====================== 自動ステータス生成 ======================
    autoStatButton.addEventListener("click", async () => {
      if (!uploadedAsset || uploadedAsset.resource_type !== "image") return showMessage("画像のみ対応です", "error");
      autoStatButton.disabled = true;
      setLoading(true, "AIでステータス生成中...");

      try {
        const res = await fetch(`${API_BASE}/ai/generate-stats`, {
          method: "POST",
          headers: getAuthHeaders(),
          body: JSON.stringify({ image_url: uploadedAsset.secure_url, title: val("title"), description: val("description"), genre: val("genre") })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "生成失敗");

        setVal("hp", data.hp || "");
        setVal("atk", data.atk || "");
        setVal("def", data.defense || data.def || "");
        setVal("spd", data.spd || "");
        setVal("luk", data.luk || "");
        showMessage("自動ステータスを反映しました", "success");
      } catch (e) {
        showMessage(e.message, "error");
      } finally {
        setLoading(false);
        autoStatButton.disabled = false;
      }
    });

    // ====================== 最終バリデーション ======================
    async function validateBeforeSubmit() {
      const required = ["userId","creatorName","title","rarity","contentHash"];
      for (const id of required) {
        if (!val(id)) {
          showMessage(`「\( {document.querySelector(`label[for=" \){id}"]`)?.textContent || id}」を入力してください`, "error");
          return false;
        }
      }
      if (!uploadedAsset?.secure_url) return showMessage("ファイルをアップロードしてください", "error");
      if (!val("contentHash")) return showMessage("コンテンツハッシュを生成してください", "error");
      return true;
    }

    // ====================== 投稿処理 ======================
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearMessage();
      if (isSubmitting) return;
      if (!(await validateBeforeSubmit())) return;

      isSubmitting = true;
      submitBtn.disabled = true;
      setLoading(true, "投稿登録中...");

      try {
        const authUserId = getAuthObject()?.user_id;
        const payload = {
          creator_user_id: authUserId,
          creator_name: safeText(val("creatorName")),
          title: safeText(val("title")),
          description: safeText(val("description")),
          genre: safeText(val("genre")),
          type: uploadedAsset.resource_type === "video" ? "video" : "image",
          image_url: uploadedAsset.resource_type !== "video" ? uploadedAsset.secure_url : "",
          video_url: uploadedAsset.resource_type === "video" ? uploadedAsset.secure_url : "",
          thumbnail_url: uploadedAsset.resource_type === "video" ? getVideoPosterUrl(uploadedAsset) : "",
          link_url: val("linkUrl"),
          x_url: val("xUrl"),
          booth_url: val("boothUrl"),
          chichipui_url: val("chichipuiUrl"),
          dlsite_url: val("dlsiteUrl"),
          rarity: val("rarity"),
          hp: numOrDefault("hp", 10),
          atk: numOrDefault("atk", 10),
          defense: numOrDefault("def", 10),
          spd: numOrDefault("spd", 10),
          luk: numOrDefault("luk", 10),
          exp_reward: 5,
          is_official: 0,
          content_hash: val("contentHash"),
          is_ball: 0,
          ball_code: ""
        };

        const res = await fetch(`${API_BASE}/admin/works/create`, {
          method: "POST",
          headers: getAuthHeaders(),
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || "投稿に失敗しました");
        }

        // Apps Script ログ（任意）
        if (APPS_SCRIPT_URL && APPS_SCRIPT_URL !== "YOUR_APPS_SCRIPT_URL") {
          await fetch(APPS_SCRIPT_URL, { method: "POST", body: JSON.stringify({ ...payload, uploaded_secure_url: uploadedAsset.secure_url }) }).catch(() => {});
        }

        // 成功通知
        localStorage.setItem("gacha_post_success_notice", JSON.stringify({
          type: "post_reward",
          message: "投稿ありがとうございます。無料ガチャ回数が1回追加されました。",
          at: Date.now()
        }));

        showMessage("投稿が完了しました！", "success");
        setTimeout(() => location.href = "index.html", 2200); // 少し長めに

      } catch (e) {
        showMessage(e.message || "投稿中にエラーが発生しました", "error");
      } finally {
        isSubmitting = false;
        submitBtn.disabled = false;
        setLoading(false);
      }
    });

    // 初期化
    document.addEventListener("DOMContentLoaded", () => {
      loadAuthUser();
      updateActionButtons();
    });
  </script>
</body>
</html>
