<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>作品投稿 | AIガチャ R18</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(180deg, #120812 0%, #1a0d1a 100%);
      color: #f5f5f5;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 20px 16px 40px;
      box-sizing: border-box;
    }

    .card {
      background: #1f1f1f;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 26px;
      text-align: center;
    }

    .sub {
      color: #d8d8d8;
      font-size: 14px;
      line-height: 1.7;
      text-align: center;
      margin-bottom: 18px;
    }

    .notice {
      margin-bottom: 16px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(179, 21, 75, 0.18);
      border: 1px solid rgba(255, 120, 170, 0.25);
      color: #ffd7e2;
      font-size: 13px;
      line-height: 1.7;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: bold;
    }

    input,
    select,
    textarea {
      width: 100%;
      box-sizing: border-box;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      background: #2a2a2a;
      color: #fff;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      cursor: pointer;
      color: #fff;
    }

    .btn-select {
      background: #7b61ff;
      width: 100%;
      margin-top: 10px;
    }

    .btn-submit {
      background: linear-gradient(135deg, #d61f69 0%, #9f1146 100%);
      width: 100%;
      margin-top: 18px;
      font-weight: bold;
      font-size: 16px;
      padding: 14px;
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    .btn-back {
      display: inline-block;
      margin-bottom: 14px;
      background: #444;
      color: #fff;
      text-decoration: none;
      padding: 8px 14px;
      border-radius: 8px;
    }

    .preview {
      margin-top: 12px;
      background: #2a2a2a;
      border-radius: 12px;
      padding: 10px;
      text-align: center;
    }

    .preview img,
    .preview video {
      max-width: 100%;
      border-radius: 10px;
    }

    .small {
      color: #bdbdbd;
      font-size: 12px;
      margin-top: 6px;
      line-height: 1.6;
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
      color: #ffd7e2;
      line-height: 1.6;
    }

    .hidden {
      display: none;
    }

    .file-name {
      margin-top: 8px;
      font-size: 13px;
      color: #d8d8d8;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="btn-back" href="index.html">← ガチャに戻る</a>

    <div class="card">
      <h1>作品投稿</h1>
      <p class="sub">
        端末から画像や動画を選んで、そのまま投稿できます。<br>
        投稿後はガチャチケットを1枚受け取れます。
      </p>

      <div class="notice">
        このページは18歳以上向け作品投稿を想定しています。<br>
        権利侵害のおそれがある作品や、掲載許可のない作品は投稿しないでください。
      </div>

      <form id="submitForm">
        <label for="creator">クリエイター名、ハンドルネーム</label>
        <input id="creator" type="text" required />

        <label for="type">タイプ</label>
        <select id="type" required>
          <option value="画像">画像</option>
          <option value="動画">動画</option>
        </
