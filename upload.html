<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>投稿ページ</title>

<script src="https://upload-widget.cloudinary.com/global/all.js"></script>
<script src="config.js"></script>
  
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f1115;
      color: #fff;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: #171a21;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    h2 { margin-top: 0; }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-bottom: 10px;
      background: #101218;
      color: #fff;
      box-sizing: border-box;
    }

    button,
    .btn-nav {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
      box-sizing: border-box;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .btn-upload { background: #2563eb; }
    .btn-auto { background: #7c3aed; }
    .btn-hash { background: #0f766e; }
    .btn-submit { background: #16a34a; }
    .btn-nav { background: #374151; }

    .preview {
      width: 100%;
      aspect-ratio: 3/4;
      background: #0b0d12;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .preview-placeholder {
      color: #9ca3af;
      text-align: center;
      padding: 16px;
      line-height: 1.7;
      font-size: 14px;
    }

    .preview img, .preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin: 12px 0;
    }

    .stat-input {
      text-align: center;
    }

    .stat-input label {
      display: block;
      font-size: 12px;
      color: #aeb5c2;
      margin-bottom: 4px;
    }

    .message {
      background: #101218;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
      display: none;
      border: 1px solid rgba(255,255,255,0.08);
      line-height: 1.7;
    }

    .message.show { display: block; }
    .message.error { color: #ff6b6b; border-color: #ff6b6b; }
    .message.success { color: #4ade80; border-color: #4ade80; }

    #loading {
      display: none;
      text-align: center;
      padding: 20px;
      color: #9ca3af;
    }

    .small-note {
      color: #9ca3af;
      font-size: 12px;
      line-height: 1.7;
      margin-bottom: 12px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="card">
    <h2>作品投稿</h2>

    <div class="preview" id="preview">
      <div class="preview-placeholder">画像または動画をアップロードしてください</div>
    </div>

    <button class="btn-upload" id="uploadBtn" type="button">画像/動画アップロード</button>
    <button class="btn-auto" id="autoStatButton" type="button">画像から自動ステータス生成</button>
    <button class="btn-hash" id="hashButton" type="button">コンテンツハッシュ自動生成</button>

    <div id="loading">処理中...</div>

    <input id="userId" placeholder="ユーザーID（必須）" required>
    <input id="creatorName" placeholder="投稿者名（表示名）（必須）" required>
    <input id="title" placeholder="タイトル（必須）" required>
    <textarea id="description" placeholder="説明（任意）"></textarea>
    <input id="genre" placeholder="ジャンル（例: ファンタジー、日常）">

    <div class="stats-grid">
      <div class="stat-input">
        <label for="hp">HP</label>
        <input id="hp" type="number" min="1" max="999" placeholder="HP">
      </div>
      <div class="stat-input">
        <label for="atk">ATK</label>
        <input id="atk" type="number" min="1" max="999" placeholder="ATK">
      </div>
      <div class="stat-input">
        <label for="def">DEF</label>
        <input id="def" type="number" min="1" max="999" placeholder="DEF">
      </div>
      <div class="stat-input">
        <label for="spd">SPD</label>
        <input id="spd" type="number" min="1" max="999" placeholder="SPD">
      </div>
      <div class="stat-input">
        <label for="luk">LUK</label>
        <input id="luk" type="number" min="1" max="999" placeholder="LUK">
      </div>
    </div>

    <select id="rarity" required>
      <option value="">レア度を選択</option>
      <option value="N">N</option>
      <option value="R">R</option>
      <option value="SR">SR</option>
      <option value="SSR">SSR</option>
    </select>

    <input id="linkUrl" placeholder="作者ページURL（任意）">
    <input id="xUrl" placeholder="X URL（任意）">
    <input id="boothUrl" placeholder="BOOTH URL（任意）">
    <input id="chichipuiUrl" placeholder="ちちぷい URL（任意）">
    <input id="dlsiteUrl" placeholder="DLsite URL（任意）">

    <input id="contentHash" placeholder="コンテンツハッシュ（必須）" required>

    <div class="small-note">
      Cloudinaryアップロード後に「自動ステータス生成」を押すと、画像特徴から HP / ATK / DEF / SPD / LUK を自動入力できます。<br>
      動画投稿では自動ステータス生成は使わず、手入力または既定値になります。
    </div>

    <button class="btn-submit" id="submitBtn" type="button">投稿する</button>

    <div id="msg" class="message"></div>

    <a href="index.html" class="btn-nav">戻る</a>
  </div>

</div>

<script>
const API_BASE = "http://127.0.0.1:8000";
const APPS_SCRIPT_URL = "YOUR_APPS_SCRIPT_URL";
const AUTH_STORAGE_KEY = "gacha_app_auth_v1";

let uploadedAsset = null;
let isSubmitting = false;

// Cloudinary Widget
const widget = cloudinary.createUploadWidget({
  cloudName: "YOUR_CLOUD_NAME",
  uploadPreset: "YOUR_UNSIGNED_PRESET",
  resourceType: "auto",
  maxFiles: 1,
  clientAllowedFormats: ["jpg", "jpeg", "png", "webp", "mp4", "webm", "mov"],
  maxFileSize: 10000000
}, (error, result) => {
  if (!error && result && result.event === "success") {
    uploadedAsset = result.info;
    renderPreview();
    showMessage("アップロード完了。自動ステータス生成または投稿できます。", false);
  } else if (error) {
    showMessage("アップロードエラー: " + (error.message || "不明"), true);
  }
});

document.getElementById("uploadBtn").addEventListener("click", () => widget.open());

// 初期化
document.addEventListener("DOMContentLoaded", () => {
  loadAuthUser();
});

// ログイン済みユーザーIDを補完
function loadAuthUser() {
  try {
    const raw = localStorage.getItem(AUTH_STORAGE_KEY);
    if (!raw) return;
    const auth = JSON.parse(raw);
    if (auth && auth.user_id && !val("userId")) {
      document.getElementById("userId").value = auth.user_id;
    }
  } catch (e) {
    console.warn("auth load failed", e);
  }
}

// プレビュー表示
function renderPreview() {
  const preview = document.getElementById("preview");
  if (!uploadedAsset) {
    preview.innerHTML = `<div class="preview-placeholder">画像または動画をアップロードしてください</div>`;
    return;
  }

  if (uploadedAsset.resource_type === "video") {
    preview.innerHTML = `<video src="${uploadedAsset.secure_url}" controls></video>`;
  } else {
    preview.innerHTML = `<img src="${uploadedAsset.secure_url}" alt="プレビュー">`;
  }
}

// Cloudinary URLの簡易検証
function isValidCloudinaryUrl(url) {
  return typeof url === "string" && /^https:\/\/res\.cloudinary\.com\//.test(url);
}

// SHA-256 ハッシュ生成
async function sha256Hex(text) {
  const encoder = new TextEncoder();
  const data = encoder.encode(text);
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
}

// コンテンツハッシュ自動生成
document.getElementById("hashButton").addEventListener("click", async () => {
  try {
    if (!uploadedAsset) {
      throw new Error("先に画像または動画をアップロードしてください");
    }

    const base = [
      uploadedAsset.public_id || "",
      uploadedAsset.secure_url || "",
      uploadedAsset.resource_type || "",
      val("title"),
      val("creatorName")
    ].join("|");

    const hash = await sha256Hex(base);
    document.getElementById("contentHash").value = hash;
    showMessage("コンテンツハッシュを自動生成しました。", false);
  } catch (e) {
    showMessage(e.message || "ハッシュ生成に失敗しました", true);
  }
});

// 自動ステータス生成
document.getElementById("autoStatButton").addEventListener("click", async () => {
  const btn = document.getElementById("autoStatButton");
  const loading = document.getElementById("loading");

  try {
    if (!uploadedAsset || uploadedAsset.resource_type !== "image") {
      throw new Error("画像をアップロードした後に実行してください");
    }

    if (!isValidCloudinaryUrl(uploadedAsset.secure_url)) {
      throw new Error("Cloudinaryの画像URLではありません");
    }

    btn.disabled = true;
    loading.style.display = "block";
    loading.textContent = "ステータス生成中...";

    const res = await fetch(`${API_BASE}/ai/generate-stats`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        image_url: uploadedAsset.secure_url,
        title: val("title"),
        description: val("description"),
        genre: val("genre")
      })
    });

    const data = await res.json();
    if (!res.ok) {
      throw new Error(data.detail || "ステータス生成に失敗しました");
    }

    document.getElementById("hp").value = data.hp || "";
    document.getElementById("atk").value = data.atk || "";
    document.getElementById("def").value = data.defense || "";
    document.getElementById("spd").value = data.spd || "";
    document.getElementById("luk").value = data.luk || "";

    showMessage("自動生成されたステータスを反映しました。", false);

  } catch (e) {
    showMessage(e.message || "エラーが発生しました", true);
  } finally {
    btn.disabled = false;
    loading.style.display = "none";
  }
});

// 投稿処理
document.getElementById("submitBtn").addEventListener("click", async () => {
  const submitBtn = document.getElementById("submitBtn");
  const loading = document.getElementById("loading");

  try {
    if (isSubmitting) return;

    if (!uploadedAsset) {
      throw new Error("ファイルをアップロードしてください");
    }

    if (!isValidCloudinaryUrl(uploadedAsset.secure_url)) {
      throw new Error("CloudinaryのアップロードURLではありません");
    }

    const requiredFields = [
      { id: "userId", label: "ユーザーID" },
      { id: "creatorName", label: "投稿者名" },
      { id: "title", label: "タイトル" },
      { id: "rarity", label: "レア度" },
      { id: "contentHash", label: "コンテンツハッシュ" }
    ];

    for (const field of requiredFields) {
      if (!val(field.id)) {
        throw new Error(`「${field.label}」は必須です`);
      }
    }

    isSubmitting = true;
    submitBtn.disabled = true;
    loading.style.display = "block";
    loading.textContent = "投稿登録中...";

    const payload = {
      creator_user_id: val("userId"),
      creator_name: val("creatorName"),
      title: val("title"),
      description: val("description"),
      genre: val("genre"),
      type: uploadedAsset.resource_type === "video" ? "video" : "image",
      image_url: uploadedAsset.resource_type !== "video" ? uploadedAsset.secure_url : "",
      video_url: uploadedAsset.resource_type === "video" ? uploadedAsset.secure_url : "",
      thumbnail_url: "",
      link_url: val("linkUrl"),
      x_url: val("xUrl"),
      booth_url: val("boothUrl"),
      chichipui_url: val("chichipuiUrl"),
      dlsite_url: val("dlsiteUrl"),
      rarity: val("rarity"),
      hp: numOrDefault("hp", 10),
      atk: numOrDefault("atk", 10),
      defense: numOrDefault("def", 10),
      spd: numOrDefault("spd", 10),
      luk: numOrDefault("luk", 10),
      exp_reward: 5,
      is_official: 0,
      content_hash: val("contentHash"),
      is_ball: 0,
      ball_code: ""
    };

    const res = await fetch(`${API_BASE}/admin/works/create`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const data = await res.json().catch(() => ({}));

    if (!res.ok) {
      throw new Error(data.detail || "投稿登録に失敗しました");
    }

    // Apps Script 監査ログ送信
    if (APPS_SCRIPT_URL && APPS_SCRIPT_URL !== "YOUR_APPS_SCRIPT_URL") {
      try {
        await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({
            ...payload,
            uploaded_secure_url: uploadedAsset.secure_url || "",
            uploaded_public_id: uploadedAsset.public_id || "",
            uploaded_resource_type: uploadedAsset.resource_type || "",
            uploaded_format: uploadedAsset.format || "",
            uploaded_bytes: uploadedAsset.bytes || 0,
            logged_at: new Date().toISOString()
          })
        });
      } catch (err) {
        console.warn("Apps Script log failed:", err);
      }
    }
    localStorage.setItem("gacha_post_success_notice", JSON.stringify({
  type: "post_reward",
  message: "投稿ありがとうございます。無料ガチャ回数が1回追加されました。",
  at: Date.now()
}));

showMessage("投稿が完了しました。投稿者には無料ガチャ1回が付与されます。まもなくガチャページへ戻ります。", false);
resetForm();
redirectToIndexAfterSuccess(2000);
  

  } catch (e) {
    showMessage(e.message || "投稿中にエラーが発生しました", true);
  } finally {
    isSubmitting = false;
    submitBtn.disabled = false;
    loading.style.display = "none";
  }
});

function val(id) {
  const el = document.getElementById(id);
  return el ? el.value.trim() : "";
}

function redirectToIndexAfterSuccess(delay = 2000) {
  setTimeout(() => {
    location.href = "index.html";
  }, delay);
}

function numOrDefault(id, fallback) {
  const n = Number(val(id));
  return Number.isFinite(n) && n > 0 ? n : fallback;
}

function showMessage(text, isError = false) {
  const m = document.getElementById("msg");
  m.textContent = text;
  m.className = "message show " + (isError ? "error" : "success");
}

function resetForm() {
  uploadedAsset = null;
  renderPreview();

  const ids = [
    "creatorName", "title", "description", "genre",
    "hp", "atk", "def", "spd", "luk",
    "rarity", "linkUrl", "xUrl", "boothUrl",
    "chichipuiUrl", "dlsiteUrl", "contentHash"
  ];

  ids.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.value = "";
  });

  loadAuthUser();
}
</script>

</body>
          </html>
