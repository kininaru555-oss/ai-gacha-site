<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>投稿ページ</title>

  <script src="https://upload-widget.cloudinary.com/global/all.js"></script>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f1115;
      color: #fff;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: #171a21;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    h2 { margin-top: 0; }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-bottom: 10px;
      background: #101218;
      color: #fff;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .btn-upload { background: #2563eb; }
    .btn-auto { background: #7c3aed; } /* 自動生成ボタン用 */
    .btn-submit { background: #16a34a; }
    .btn-nav { background: #374151; }

    .preview {
      width: 100%;
      aspect-ratio: 3/4;
      background: #0b0d12;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .preview img, .preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin: 12px 0;
    }

    .stat-input {
      text-align: center;
    }

    .stat-input label {
      display: block;
      font-size: 12px;
      color: #aeb5c2;
      margin-bottom: 4px;
    }

    .message {
      background: #101218;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
      display: none;
    }

    .message.show { display: block; }
    .message.error { color: #ff6b6b; border: 1px solid #ff6b6b; }
    #loading { display: none; text-align: center; padding: 20px; color: #9ca3af; }
  </style>
</head>

<body>

<div class="container">

  <div class="card">
    <h2>作品投稿</h2>

    <div class="preview" id="preview"></div>

    <button class="btn-upload" id="uploadBtn">画像/動画アップロード</button>
    <button class="btn-auto" id="autoStatButton">画像から自動ステータス生成</button>

    <div id="loading">ステータス生成中...</div>

    <input id="userId" placeholder="ユーザーID（必須）" required>
    <input id="creatorName" placeholder="投稿者名（表示名）" required>
    <input id="title" placeholder="タイトル（必須）" required>
    <textarea id="description" placeholder="説明（任意）"></textarea>
    <input id="genre" placeholder="ジャンル（例: ファンタジー、日常）">

    <!-- 自動生成で埋めるステータス欄 -->
    <div class="stats-grid">
      <div class="stat-input">
        <label>HP</label>
        <input id="hp" type="number" min="1" max="999" placeholder="HP">
      </div>
      <div class="stat-input">
        <label>ATK</label>
        <input id="atk" type="number" min="1" max="999" placeholder="ATK">
      </div>
      <div class="stat-input">
        <label>DEF</label>
        <input id="def" type="number" min="1" max="999" placeholder="DEF">
      </div>
      <div class="stat-input">
        <label>SPD</label>
        <input id="spd" type="number" min="1" max="999" placeholder="SPD">
      </div>
      <div class="stat-input">
        <label>LUK</label>
        <input id="luk" type="number" min="1" max="999" placeholder="LUK">
      </div>
    </div>

    <select id="rarity" required>
      <option value="">レア度を選択</option>
      <option value="N">N</option>
      <option value="R">R</option>
      <option value="SR">SR</option>
      <option value="SSR">SSR</option>
    </select>

    <input id="linkUrl" placeholder="作者ページURL（任意）">
    <input id="xUrl" placeholder="X URL（任意）">
    <input id="boothUrl" placeholder="BOOTH URL（任意）">
    <input id="chichipuiUrl" placeholder="ちちぷい URL（任意）">
    <input id="dlsiteUrl" placeholder="DLsite URL（任意）">

    <input id="contentHash" placeholder="コンテンツハッシュ（必須）" required>

    <button class="btn-submit" id="submitBtn">投稿する</button>

    <div id="msg" class="message"></div>

    <a href="index.html" class="btn-nav">戻る</a>
  </div>

</div>

<script>
const API_BASE = "http://127.0.0.1:8000";

// Cloudinary Widget（unsignedのままですが本番ではsigned推奨）
const widget = cloudinary.createUploadWidget({
  cloudName: "YOUR_CLOUD_NAME",
  uploadPreset: "YOUR_UNSIGNED_PRESET",
  resourceType: "auto",
  maxFiles: 1,
  clientAllowedFormats: ["jpg","png","webp","mp4","webm"],
  maxFileSize: 10000000
}, (error, result) => {
  if (!error && result && result.event === "success") {
    uploadedAsset = result.info;
    renderPreview();
    showMessage("アップロード完了！ 自動生成ボタンを押せます", false);
  } else if (error) {
    showMessage("アップロードエラー: " + (error.message || "不明"), true);
  }
});

let uploadedAsset = null;

document.getElementById("uploadBtn").onclick = () => widget.open();

// プレビュー表示
function renderPreview() {
  const preview = document.getElementById("preview");
  if (!uploadedAsset) return;

  if (uploadedAsset.resource_type === "video") {
    preview.innerHTML = `<video src="${uploadedAsset.secure_url}" controls></video>`;
  } else {
    preview.innerHTML = `<img src="${uploadedAsset.secure_url}" alt="プレビュー">`;
  }
}

// 自動ステータス生成ボタン
document.getElementById("autoStatButton").addEventListener("click", async () => {
  const btn = document.getElementById("autoStatButton");
  const loading = document.getElementById("loading");

  try {
    if (!uploadedAsset || uploadedAsset.resource_type !== "image") {
      throw new Error("画像をアップロードした後に実行してください");
    }

    btn.disabled = true;
    loading.style.display = "block";

    const res = await fetch(`${API_BASE}/ai/generate-stats`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        image_url: uploadedAsset.secure_url,
        title: document.getElementById("title").value.trim(),
        description: document.getElementById("description").value.trim(),
        genre: document.getElementById("genre").value.trim()
      })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || "ステータス生成に失敗しました");

    // 入力欄に反映
    document.getElementById("hp").value  = data.hp  || "";
    document.getElementById("atk").value = data.atk || "";
    document.getElementById("def").value = data.defense || "";
    document.getElementById("spd").value = data.spd || "";
    document.getElementById("luk").value = data.luk || "";

    showMessage("自動生成されたステータスを反映しました！", false);

  } catch (e) {
    showMessage(e.message || "エラーが発生しました", true);
  } finally {
    btn.disabled = false;
    loading.style.display = "none";
  }
});

// 投稿処理（既存部分を簡略化・統合）
document.getElementById("submitBtn").onclick = async () => {
  if (!uploadedAsset) return showMessage("ファイルをアップロードしてください", true);

  const required = ["userId", "creatorName", "title", "rarity", "contentHash"];
  for (const id of required) {
    if (!val(id)) return showMessage(`「\( {document.querySelector(`# \){id}`).placeholder}」は必須です`, true);
  }

  try {
    const payload = {
      creator_user_id: val("userId"),
      creator_name: val("creatorName"),
      title: val("title"),
      description: val("description"),
      genre: val("genre"),
      type: uploadedAsset.resource_type === "video" ? "video" : "image",
      image_url: uploadedAsset.resource_type !== "video" ? uploadedAsset.secure_url : "",
      video_url: uploadedAsset.resource_type === "video" ? uploadedAsset.secure_url : "",
      hp: Number(val("hp")) || null,
      atk: Number(val("atk")) || null,
      defense: Number(val("def")) || null,
      spd: Number(val("spd")) || null,
      luk: Number(val("luk")) || null,
      rarity: val("rarity"),
      link_url: val("linkUrl"),
      x_url: val("xUrl"),
      booth_url: val("boothUrl"),
      chichipui_url: val("chichipuiUrl"),
      dlsite_url: val("dlsiteUrl"),
      content_hash: val("contentHash")
    };

    const res = await fetch(`${API_BASE}/admin/works/create`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || "投稿登録に失敗しました");
    }

    showMessage("投稿が完了しました！ 審査をお待ちください。", false);
    resetForm();

  } catch (e) {
    showMessage(e.message, true);
  }
};

function val(id) {
  return document.getElementById(id)?.value?.trim() || "";
}

function showMessage(text, isError = false) {
  const m = document.getElementById("msg");
  m.textContent = text;
  m.style.color = isError ? "#ff6b6b" : "#4ade80";
  m.classList.add("show");
  setTimeout(() => m.classList.remove("show"), 8000);
}

function resetForm() {
  uploadedAsset = null;
  document.getElementById("preview").innerHTML = "";
  document.querySelectorAll("input, textarea, select").forEach(el => {
    if (el.type !== "button") el.value = "";
  });
}
</script>

</body>
</html>
