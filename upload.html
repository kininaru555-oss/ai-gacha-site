<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>投稿ページ</title>
  <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
  <style>
    /* 既存スタイルほぼそのまま */
    body { margin:0; font-family:sans-serif; background:#0f1115; color:#fff; }
    .container { max-width:560px; margin:0 auto; padding:16px; }
    .card { background:#171a21; border-radius:16px; padding:16px; margin-bottom:16px; }
    h2 { margin-top:0; }
    input, textarea, select {
      width:100%; padding:12px; border-radius:10px; border:none; margin-bottom:10px;
      background:#101218; color:#fff;
    }
    button {
      width:100%; padding:12px; border-radius:10px; border:none;
      font-weight:bold; cursor:pointer;
    }
    .btn-upload { background:#2563eb; }
    .btn-submit { background:#16a34a; }
    .btn-nav { background:#374151; margin-top:10px; }
    .preview { width:100%; aspect-ratio:3/4; background:#0b0d12; border-radius:12px; overflow:hidden; margin-bottom:10px; }
    .preview img, .preview video { width:100%; height:100%; object-fit:cover; }
    .message { background:#101218; padding:10px; border-radius:10px; margin-top:10px; display:none; }
    .message.show { display:block; }
    .message.error { color:#ff6b6b; border:1px solid #ff6b6b; }
    #loading { display:none; text-align:center; padding:20px; color:#9ca3af; }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <h2>作品投稿</h2>

    <div class="preview" id="preview"></div>
    <div id="loading">アップロード中...</div>

    <button class="btn-upload" id="uploadBtn">画像/動画を選択</button>

    <input id="userId" placeholder="ユーザーID（必須）" required>
    <input id="creatorName" placeholder="投稿者名（表示名）" required>
    <input id="title" placeholder="タイトル（必須）" required>
    <textarea id="description" placeholder="説明（任意）"></textarea>
    <input id="genre" placeholder="ジャンル（例: ファンタジー、日常）">

    <select id="rarity" required>
      <option value="">レア度を選択</option>
      <option value="N">N</option>
      <option value="R">R</option>
      <option value="SR">SR</option>
      <option value="SSR">SSR</option>
    </select>

    <input id="linkUrl" placeholder="作者ページURL（任意）">
    <input id="xUrl" placeholder="X URL（任意）">
    <input id="boothUrl" placeholder="BOOTH URL（任意）">
    <input id="chichipuiUrl" placeholder="ちちぷい URL（任意）">
    <input id="dlsiteUrl" placeholder="DLsite URL（任意）">

    <input id="contentHash" placeholder="コンテンツハッシュ（必須・重複防止用）" required>

    <button class="btn-submit" id="submitBtn">投稿する</button>

    <div id="msg" class="message"></div>

    <a href="index.html" class="btn-nav">戻る</a>
  </div>
</div>

<script>
const API_BASE = "http://127.0.0.1:8000";  // 本番は https に
let uploadedFileInfo = null;

// =============================================
// 署名取得関数（バックエンド経由で安全に）
// =============================================
async function getUploadSignature(params) {
  try {
    const res = await fetch(`${API_BASE}/admin/upload-signature`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(params || {})
    });
    if (!res.ok) throw new Error("署名取得失敗");
    return await res.json();  // { signature, timestamp, ... }
  } catch (err) {
    throw new Error("署名生成エラー: " + err.message);
  }
}

// =============================================
// Cloudinary Widget（signedモード）
// =============================================
const widget = cloudinary.createUploadWidget({
  cloudName: "YOUR_CLOUD_NAME",           // ← フロントに露出OK
  uploadPreset: undefined,                // unsignedではないので不要
  // signed: true に相当する設定は signature で制御
  resourceType: "auto",
  maxFiles: 1,
  clientAllowedFormats: ["jpg","png","webp","mp4","webm"],
  maxFileSize: 20000000,  // 20MB
}, async (error, result) => {
  if (error) {
    showMessage("アップロードエラー: " + error.message, true);
    return;
  }
  if (result && result.event === "success") {
    uploadedFileInfo = result.info;
    renderPreview();
    showMessage("アップロード完了！", false);
  }
});

// Widgetオープン時に署名を動的に生成
document.getElementById("uploadBtn").onclick = async () => {
  try {
    // 署名をバックエンドから取得（public_id や folder も指定可能）
    const signatureData = await getUploadSignature({
      // folder: "gacha_works",  // 任意
      // public_id: "custom_name", // 任意
    });

    widget.update({ 
      // signed upload 用パラメータを注入
      apiKey: "YOUR_API_KEY",  // フロント露出OK
      signature: signatureData.signature,
      timestamp: signatureData.timestamp,
      // 必要に応じて追加パラメータ
    });

    widget.open();
  } catch (err) {
    showMessage(err.message, true);
  }
};

function renderPreview() {
  const preview = document.getElementById("preview");
  if (!uploadedFileInfo) return;

  if (uploadedFileInfo.resource_type === "video") {
    preview.innerHTML = `<video src="${uploadedFileInfo.secure_url}" controls></video>`;
  } else {
    preview.innerHTML = `<img src="${uploadedFileInfo.secure_url}" alt="プレビュー">`;
  }
}

// =============================================
// 投稿処理（FastAPIへ）
// =============================================
document.getElementById("submitBtn").onclick = async () => {
  if (!uploadedFileInfo) return showMessage("まずファイルをアップロードしてください", true);

  const requiredFields = ["userId", "creatorName", "title", "rarity", "contentHash"];
  for (const id of requiredFields) {
    if (!val(id)) return showMessage(`「\( {document.querySelector(`# \){id}`).placeholder}」は必須です`, true);
  }

  try {
    document.getElementById("loading").style.display = "block";
    document.getElementById("submitBtn").disabled = true;

    const payload = {
      creator_user_id: val("userId"),
      creator_name: val("creatorName"),
      title: val("title"),
      description: val("description"),
      genre: val("genre"),
      type: uploadedFileInfo.resource_type === "video" ? "video" : "image",
      image_url: uploadedFileInfo.resource_type !== "video" ? uploadedFileInfo.secure_url : "",
      video_url: uploadedFileInfo.resource_type === "video" ? uploadedFileInfo.secure_url : "",
      link_url: val("linkUrl"),
      x_url: val("xUrl"),
      booth_url: val("boothUrl"),
      chichipui_url: val("chichipuiUrl"),
      dlsite_url: val("dlsiteUrl"),
      rarity: val("rarity"),
      content_hash: val("contentHash")
    };

    // FastAPI に投稿
    const res = await fetch(`${API_BASE}/admin/works/create`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    if (!res.ok) {
      const errData = await res.json();
      throw new Error(errData.detail || "投稿登録に失敗しました");
    }

    showMessage("投稿が完了しました！ 審査後にガチャに反映されます。", false);
    resetForm();

  } catch (e) {
    showMessage(e.message, true);
  } finally {
    document.getElementById("loading").style.display = "none";
    document.getElementById("submitBtn").disabled = false;
  }
};

function val(id) {
  return document.getElementById(id)?.value?.trim() || "";
}

function showMessage(text, isError = false) {
  const m = document.getElementById("msg");
  m.textContent = text;
  m.style.color = isError ? "#ff6b6b" : "#4ade80";
  m.classList.add("show");
  setTimeout(() => m.classList.remove("show"), 8000);
}

function resetForm() {
  uploadedFileInfo = null;
  document.getElementById("preview").innerHTML = "";
  document.querySelectorAll("input:not([type=button]), textarea, select").forEach(el => el.value = "");
}
</script>
</body>
</html>
