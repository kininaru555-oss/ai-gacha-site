<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>18歳以上確認 | AIガチャ R18</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #111;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      box-sizing: border-box;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: #222;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
    }

    p {
      line-height: 1.8;
      color: #ddd;
    }

    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    a, button {
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 16px;
      text-decoration: none;
      cursor: pointer;
      min-width: 140px;
    }

    .yes {
      background: #e91e63;
      color: #fff;
    }

    .no {
      background: #555;
      color: #fff;
    }

    .small {
      font-size: 13px;
      color: #aaa;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>18歳以上の方のみ</h1>
    <p>
      この先には成人向けコンテンツが含まれる可能性があります。<br>
      18歳未満の方は閲覧できません。
    </p>
    <p>
      あなたは18歳以上ですか？
    </p>

    <div class="buttons">
      <button class="yes" onclick="enterAdult()">はい</button>
      <a class="no" href="index.html">いいえ</a>
    </div>

    <p class="small">
      「はい」を押すと、18歳以上であることに同意したものとみなします。
    </p>
  </div>

  <script>
    function enterAdult() {
      localStorage.setItem("adult_confirmed", "yes");
      location.href = "adult.html";
    }
  </script>
</body>
</html>
