<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIガチャ 人気ランキング</title>

  <!-- SEO & OGP -->
  <meta name="description" content="AIガチャMAX R18の人気ランキング。上位10作品をいいね数でチェック！" />
  <meta property="og:title" content="AIガチャMAX R18 - 人気ランキング" />
  <meta property="og:description" content="投稿されたR18 AI作品の人気TOP10。あなたの作品もランクインしよう！" />
  <meta property="og:image" content="https://your-domain.com/og-ranking.jpg" /> <!-- ここにランキング風画像URLを -->
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="stylesheet" href="style.css" />
  <style>
    .card.gold   .rank { background: #ffd700; color: #000; }
    .card.silver .rank { background: #c0c0c0; color: #000; }
    .card.bronze .rank { background: #cd7f32; color: #000; }
    .card.error {
      background: #330000;
      border: 1px solid #ff4444;
      padding: 20px;
      text-align: center;
    }
    .top-nav {
      margin: 20px 0;
      text-align: center;
    }
    .top-nav a {
      margin: 0 15px;
      color: #ff66cc;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="top-nav">
      <a href="index.html">← ガチャに戻る</a>
      <a href="creators.html">作者ランキング</a>
    </header>

    <div class="hero">
      <h1>人気ランキング</h1>
      <p class="sub">いいね数上位10作品のみ表示しています</p>
    </div>

    <div id="ranking" class="grid"></div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwLrNDEaGQyPJVwq3ggfOfUpHQe0gIrfCrcoXJTs6SRXbBTX957uSY3ndsi_f_ylV12jw/exec";

    function optimizeCloudinary(url) {
      if (!url) return "";
      if (url.includes("res.cloudinary.com") && !url.includes("f_auto")) {
        return url.replace("/upload/", "/upload/f_auto,q_auto/");
      }
      return url;
    }

    // サーバー側と完全に一致させる
    function getWorkId(work) {
      const creator = (work.creator || "投稿者不明").trim();
      const file = (work.file || "").trim();
      return work.id || `AI作品_\( {creator}_ \){file}`;
    }

    function normalizeRarity(r) {
      if (!r) return "N";
      const v = String(r).toUpperCase().trim();
      if (v === "SSR") return "SSR";
      if (v === "SR") return "SR";
      if (v === "R" || v === "RARE") return "R";
      return "N";
    }

    function getMediaType(work) {
      const type = String(work.type || "").trim();
      if (type === "video" || type === "動画") return "video";
      if (type === "image" || type === "画像") return "image";
      if (work.videoUrl) return "video";
      return "image";
    }

    function getMediaUrl(work) {
      const mediaType = getMediaType(work);
      if (mediaType === "video") {
        return optimizeCloudinary(work.videoUrl || work.file || "");
      }
      return optimizeCloudinary(work.imageUrl || work.file || "");
    }

    async function sendLike(id) {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          mode: "like",
          id: id
        })
      });

      if (!response.ok) {
        throw new Error("いいね更新失敗");
      }

      return await response.json();
    }

    async function loadRanking() {
      try {
        const res = await fetch(API_URL + "?t=" + Date.now(), {
          cache: "no-store",
          headers: { "Cache-Control": "no-cache" }
        });

        if (!res.ok) {
          throw new Error("API取得失敗: " + res.status);
        }

        const raw = await res.json();
        const data = Array.isArray(raw) ? raw : (raw.items || []);

        const items = data.map((item) => ({
          ...item,
          likes: Number(item.likes || 0)
        }));

        items.sort((a, b) => b.likes - a.likes);

        const rankingDiv = document.getElementById("ranking");
        rankingDiv.innerHTML = "";

        if (!items.length) {
          rankingDiv.innerHTML = "<div class='card'>まだ作品がありません。</div>";
          return;
        }

        items.slice(0, 10).forEach((item, index) => {
          const mediaType = getMediaType(item);
          const fileUrl = getMediaUrl(item);

          const media =
            mediaType === "video"
              ? `<video src="${fileUrl}" controls playsinline preload="metadata" muted loading="lazy"></video>`
              : `<img src="\( {fileUrl}" alt=" \){item.title || "作品画像"}" loading="lazy">`;

          const linkHtml =
            item.link && item.link !== "#"
              ? `<a class="work-link" href="${item.link}" target="_blank" rel="noopener noreferrer">作品リンクへ →</a>`
              : "";

          const card = document.createElement("div");
          card.className = `card ${index === 0 ? 'gold' : index === 1 ? 'silver' : index === 2 ? 'bronze' : ''}`;

          card.innerHTML = `
            <div class="rank" aria-label="第\( {index + 1}位"># \){index + 1}</div>
            <h3>${item.title || "無題"}</h3>
            ${media}
            <div>作者: ${item.creator || "投稿者不明"}</div>
            <div>ジャンル: ${item.genre || "未指定"}</div>
            <div>レアリティ: ${normalizeRarity(item.rarity)}</div>
            <div class="likes">❤️ <span class="like-value">${item.likes}</span></div>
            <button type="button" data-id="${encodeURIComponent(getWorkId(item))}">いいね</button>
            ${linkHtml}
          `;

          const button = card.querySelector("button");
          const likeValue = card.querySelector(".like-value");

          button.addEventListener("click", async () => {
            if (button.disabled) return;
            button.disabled = true;
            button.textContent = "処理中...";

            try {
              const result = await sendLike(decodeURIComponent(button.dataset.id));

              if (result.success) {
                likeValue.textContent = result.likes || 0;
                button.textContent = "いいね済み";
                button.disabled = true; // 成功後も無効化
              } else {
                alert("いいねに失敗しました");
                button.textContent = "いいね";
                button.disabled = false;
              }
            } catch (error) {
              console.error(error);
              alert("いいねに失敗しました");
              button.textContent = "いいね";
              button.disabled = false;
            }
          });

          rankingDiv.appendChild(card);
        });
      } catch (error) {
        console.error(error);
        document.getElementById("ranking").innerHTML = `
          <div class="card error">
            <p>ランキングを読み込めませんでした…</p>
            <p><a href="#" onclick="loadRanking(); return false;">もう一度読み込む</a></p>
            <p>または <a href="index.html">ガチャに戻る</a></p>
          </div>
        `;
      }
    }

    loadRanking();
  </script>
</body>
</html>
