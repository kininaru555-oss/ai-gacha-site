<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIガチャ 人気ランキング</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="top-nav">
      <a href="index.html">← ガチャに戻る</a>
      <a href="creators.html">作者ランキング</a>
    </header>

    <div class="hero">
      <h1>人気ランキング</h1>
      <p class="sub">いいね数上位10作品のみ表示しています</p>
    </div>

    <div id="ranking" class="grid"></div>
  </div>

  <script>
    const API_URL =
      "https://script.google.com/macros/s/AKfycbzRW9dHBTOaRkM8gibA09i9L8zSiDDdd1YNWikqT4wn7zQWSaJQpo3-5CJx61od6-sNbQ/exec";

    function optimizeCloudinary(url) {
      if (!url) return "";
      if (url.includes("res.cloudinary.com") && !url.includes("f_auto")) {
        return url.replace("/upload/", "/upload/f_auto,q_auto/");
      }
      return url;
    }

    function getWorkId(work) {
      const creator = (work.creator || "投稿者不明").trim();
      const file = (work.file || "").trim();
      return work.id || `AI作品_${creator}_${file}`;
    }

    function normalizeRarity(r) {
      if (!r) return "N";
      const v = String(r).toUpperCase().trim();
      if (v === "SSR") return "SSR";
      if (v === "SR") return "SR";
      if (v === "R" || v === "RARE") return "R";
      return "N";
    }

    function getMediaType(work) {
      const type = String(work.type || "").trim();
      if (type === "video" || type === "動画") return "video";
      if (type === "image" || type === "画像") return "image";
      if (work.videoUrl) return "video";
      return "image";
    }

    function getMediaUrl(work) {
      const mediaType = getMediaType(work);
      if (mediaType === "video") {
        return optimizeCloudinary(work.videoUrl || work.file || "");
      }
      return optimizeCloudinary(work.imageUrl || work.file || "");
    }

    async function sendLike(id) {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify({
          mode: "like",
          id: id
        })
      });

      if (!response.ok) {
        throw new Error("いいね更新失敗");
      }

      return await response.json();
    }

    async function loadRanking() {
      try {
        const res = await fetch(API_URL + "?t=" + Date.now(), {
          cache: "no-store"
        });

        if (!res.ok) {
          throw new Error("API取得失敗: " + res.status);
        }

        const raw = await res.json();
        const data = Array.isArray(raw) ? raw : (raw.items || []);

        const items = data.map((item) => ({
          ...item,
          likes: Number(item.likes || 0)
        }));

        items.sort((a, b) => b.likes - a.likes);

        const rankingDiv = document.getElementById("ranking");
        rankingDiv.innerHTML = "";

        if (!items.length) {
          rankingDiv.innerHTML = "<div class='card card-empty'>まだ作品がありません。</div>";
          return;
        }

        items.slice(0, 10).forEach((item, index) => {
          const mediaType = getMediaType(item);
          const fileUrl = getMediaUrl(item);

          const media =
            mediaType === "video"
              ? `<video class="ranking-media" src="${fileUrl}" controls playsinline preload="metadata" muted></video>`
              : `<img class="ranking-media" src="${fileUrl}" alt="${item.title || "作品画像"}" loading="lazy">`;

          const linkHtml =
            item.link && item.link !== "#"
              ? `<a class="work-link" href="${item.link}" target="_blank" rel="noopener noreferrer">作品リンクへ →</a>`
              : "";

          const card = document.createElement("div");
          card.className = `card ranking-card ${index === 0 ? "gold" : index === 1 ? "silver" : index === 2 ? "bronze" : ""}`;

          card.innerHTML = `
            <div class="rank" aria-label="第${index + 1}位">#${index + 1}</div>
            <h3>${item.title || "無題"}</h3>
            ${media}
            <div>作者: ${item.creator || "投稿者不明"}</div>
            <div>ジャンル: ${item.genre || "未指定"}</div>
            <div>レアリティ: ${normalizeRarity(item.rarity)}</div>
            <div class="likes">❤️ <span class="like-value">${item.likes}</span></div>
            <button type="button" data-id="${encodeURIComponent(getWorkId(item))}">いいね</button>
            ${linkHtml}
          `;

          const button = card.querySelector("button");
          const likeValue = card.querySelector(".like-value");

          button.addEventListener("click", async () => {
            if (button.disabled) return;

            button.disabled = true;
            button.textContent = "処理中...";

            try {
              const result = await sendLike(decodeURIComponent(button.dataset.id));

              if (result.success) {
                likeValue.textContent = result.likes || 0;
                button.textContent = "いいね済み";
              } else {
                alert("いいねに失敗しました");
                button.textContent = "いいね";
                button.disabled = false;
              }
            } catch (error) {
              console.error(error);
              alert("いいねに失敗しました");
              button.textContent = "いいね";
              button.disabled = false;
            }
          });

          rankingDiv.appendChild(card);
        });
      } catch (error) {
        console.error(error);
        document.getElementById("ranking").innerHTML = `
          <div class="card card-error">
            <p>ランキングを読み込めませんでした…</p>
            <p><a href="#" onclick="loadRanking(); return false;">もう一度読み込む</a></p>
            <p>または <a href="index.html">ガチャに戻る</a></p>
          </div>
        `;
      }
    }

    loadRanking();
  </script>
</body>
</html>
