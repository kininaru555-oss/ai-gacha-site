<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>売却実績ランキング | 権利台帳</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="top-nav">
      <a href="index.html">← トップへ戻る</a>
      <a href="creators.html">クリエイター売上ランキング</a>
    </header>

    <div class="hero">
      <h1>売却実績ランキング</h1>
      <p class="sub">
        直近の売却実績を、売却額の高い順に表示しています。<br />
        「何が高く売れたか」を見て、そのまま作品詳細へ進めます。
      </p>
    </div>

    <div id="rankingSummary" class="notice-box">
      読み込み中...
    </div>

    <div id="ranking" class="grid"></div>
  </div>

  <script>
    const API_BASE = "https://aicontents.onrender.com";
    const SALES_RANKING_API = `${API_BASE}/api/ranking/sales?limit=30`;

    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function optimizeCloudinary(url) {
      if (!url) return "";
      if (url.includes("res.cloudinary.com") && !url.includes("f_auto")) {
        return url.replace("/upload/", "/upload/f_auto,q_auto/");
      }
      return url;
    }

    function formatDate(value) {
      if (!value) return "-";
      try {
        const dt = new Date(value);
        if (Number.isNaN(dt.getTime())) return escapeHtml(value);
        const y = dt.getFullYear();
        const m = String(dt.getMonth() + 1).padStart(2, "0");
        const d = String(dt.getDate()).padStart(2, "0");
        return `${y}/${m}/${d}`;
      } catch {
        return escapeHtml(value);
      }
    }

    function formatSaleType(item) {
      const type = String(item.ownership_type || "").trim();
      if (type === "copyright_transfer") return "サイト内権利譲渡";
      if (type === "site_license") return "サイト内利用権";
      return type || "権利";
    }

    function buildRankClass(index) {
      if (index === 0) return "gold";
      if (index === 1) return "silver";
      if (index === 2) return "bronze";
      return "";
    }

    function renderSummary(items) {
      const summaryEl = document.getElementById("rankingSummary");

      if (!Array.isArray(items) || items.length === 0) {
        summaryEl.textContent = "まだ売却実績はありません。";
        return;
      }

      const totalSales = items.reduce((sum, item) => {
        return sum + Number(item.final_price || 0);
      }, 0);

      const maxSale = items.reduce((max, item) => {
        return Math.max(max, Number(item.final_price || 0));
      }, 0);

      summaryEl.innerHTML = `
        表示件数: ${items.length}件<br>
        合計売却額: ${totalSales}円<br>
        最高売却額: ${maxSale}円
      `;
    }

    function renderRanking(items) {
      const rankingEl = document.getElementById("ranking");

      if (!Array.isArray(items) || items.length === 0) {
        rankingEl.innerHTML = `
          <div class="card card-empty">
            まだ売却実績がありません。
          </div>
        `;
        return;
      }

      rankingEl.innerHTML = items.map((item, index) => {
        const rankClass = buildRankClass(index);
        const contentId = Number(item.content_id || 0);
        const title = escapeHtml(item.title || "無題");
        const author = escapeHtml(item.author || "不明");
        const genre = escapeHtml(item.genre || "-");
        const rarity = escapeHtml(item.rarity || "-");
        const rightType = escapeHtml(item.right_type || "-");
        const ownershipType = escapeHtml(formatSaleType(item));
        const finalPrice = Number(item.final_price || 0);
        const saleDate = formatDate(item.created_at);
        const imageUrl = optimizeCloudinary(
          item.image_url || "https://via.placeholder.com/600x800?text=No+Image"
        );

        return `
          <article class="card ranking-card ${rankClass}">
            <div class="rank">#${index + 1}</div>
            <a class="card-link" href="/works/${contentId}">
              <img
                class="ranking-media"
                src="${escapeHtml(imageUrl)}"
                alt="${title}"
                loading="lazy"
              />
            </a>
            <h3>${title}</h3>
            <div class="badge-row">
              <span class="badge">${genre}</span>
              <span class="badge">${rarity}</span>
            </div>
            <div class="card-meta">作者: ${author}</div>
            <div class="card-meta">作品権利設定: ${rightType}</div>
            <div class="card-meta">売却権利種別: ${ownershipType}</div>
            <div class="likes">売却額: ${finalPrice}円</div>
            <div class="card-meta">売却日: ${saleDate}</div>
            <a class="work-link" href="/works/${contentId}">作品詳細を見る →</a>
          </article>
        `;
      }).join("");
    }

    async function loadRanking() {
      const rankingEl = document.getElementById("ranking");
      rankingEl.innerHTML = `
        <div class="card card-empty">読み込み中...</div>
      `;

      try {
        const res = await fetch(SALES_RANKING_API, {
          cache: "no-store"
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.detail || "売却実績ランキングの取得に失敗しました");
        }

        const items = Array.isArray(data.items) ? data.items : [];
        renderSummary(items);
        renderRanking(items);
      } catch (error) {
        console.error(error);
        document.getElementById("rankingSummary").textContent =
          "ランキングの読み込みに失敗しました。";

        rankingEl.innerHTML = `
          <div class="card card-error">
            <p>売却実績ランキングを読み込めませんでした。</p>
            <p><a href="#" onclick="loadRanking(); return false;">もう一度読み込む</a></p>
            <p><a href="index.html">トップへ戻る</a></p>
          </div>
        `;
      }
    }

    loadRanking();
  </script>
</body>
</html>
