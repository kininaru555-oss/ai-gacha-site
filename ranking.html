<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIガチャ 人気ランキング</title>
  <style>
    body {
      font-family: sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: #222;
      padding: 15px;
      border-radius: 12px;
    }

    img,
    video {
      width: 100%;
      border-radius: 10px;
    }

    button {
      margin-top: 10px;
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      background: #e91e63;
      color: white;
      cursor: pointer;
    }

    .likes {
      margin-top: 8px;
      color: #ffcc66;
      font-size: 14px;
    }

    .toplink {
      display: inline-block;
      margin-bottom: 20px;
      margin-right: 8px;
      color: #fff;
      text-decoration: none;
      background: #444;
      padding: 8px 14px;
      border-radius: 8px;
    }

    .work-link {
      display: inline-block;
      margin-top: 10px;
      color: #fff;
      text-decoration: none;
      background: #0b57d0;
      padding: 8px 12px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <a class="toplink" href="index.html">← ガチャに戻る</a>
  <a class="toplink" href="creators.html">作者ランキング</a>

  <h1>人気ランキング</h1>

  <div id="ranking" class="grid"></div>

  <script>
    const API_URL =
      "https://script.google.com/macros/s/AKfycbzNr63zr_dtRmkhyEPvHy8r8bDvZIYEq26cc7W2Xz8M95G638oAXJUXE_vE2KDf0aWwoQ/exec";

    function optimizeCloudinary(url) {
      if (!url) return "";
      if (url.includes("res.cloudinary.com") && !url.includes("f_auto")) {
        return url.replace("/upload/", "/upload/f_auto,q_auto/");
      }
      return url;
    }

    function getLikes() {
      const raw = localStorage.getItem("likes");
      return raw ? JSON.parse(raw) : {};
    }

    function setLikes(likes) {
      localStorage.setItem("likes", JSON.stringify(likes));
    }

    function getWorkId(work) {
      return (work.title || "") + "_" + (work.creator || "");
    }

    async function loadRanking() {
      try {
        const res = await fetch(API_URL, { cache: "no-store" });

        if (!res.ok) {
          throw new Error("API取得失敗: " + res.status);
        }

        const data = await res.json();
        const likes = getLikes();

        const items = data.map((item) => {
          const id = getWorkId(item);
          return {
            ...item,
            likes: likes[id] || 0
          };
        });

        items.sort((a, b) => b.likes - a.likes);

        const rankingDiv = document.getElementById("ranking");
        rankingDiv.innerHTML = "";

        if (!items.length) {
          rankingDiv.innerHTML = "<p>まだ作品がありません。</p>";
          return;
        }

        items.forEach((item) => {
          let media = "";
          const fileUrl = optimizeCloudinary(item.file);

          if (item.type === "video") {
            media = `<video src="${fileUrl}" controls playsinline preload="metadata"></video>`;
          } else {
            media = `<img src="${fileUrl}" alt="${item.title || ""}">`;
          }

          const linkHtml =
            item.link && item.link !== "#"
              ? `<a class="work-link" href="${item.link}" target="_blank" rel="noopener noreferrer">作品リンクへ</a>`
              : "";

          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <h3>${item.title || ""}</h3>
            ${media}
            <div>作者: ${item.creator || ""}</div>
            <div class="likes">❤️ ${item.likes}</div>
            <button data-id="${encodeURIComponent(getWorkId(item))}">いいね</button>
            ${linkHtml}
          `;

          const button = card.querySelector("button");
          button.addEventListener("click", () => {
            const id = decodeURIComponent(button.dataset.id);
            const likesMap = getLikes();
            likesMap[id] = (likesMap[id] || 0) + 1;
            setLikes(likesMap);
            location.reload();
          });

          rankingDiv.appendChild(card);
        });
      } catch (error) {
        console.error(error);
        document.getElementById("ranking").innerHTML =
          "<p>ランキングを読み込めませんでした。</p>";
      }
    }

    loadRanking();
  </script>
</body>
</html>
