<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIガチャ 人気ランキング</title>
  <style>
    body {
      font-family: sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: #222;
      padding: 15px;
      border-radius: 12px;
      text-align: left;
    }

    img,
    video {
      width: 100%;
      border-radius: 10px;
      display: block;
      margin-bottom: 10px;
    }

    button {
      margin-top: 10px;
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      background: #e91e63;
      color: white;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: default;
    }

    .likes {
      margin-top: 8px;
      color: #ffcc66;
      font-size: 14px;
    }

    .toplink {
      display: inline-block;
      margin-bottom: 20px;
      margin-right: 8px;
      color: #fff;
      text-decoration: none;
      background: #444;
      padding: 8px 14px;
      border-radius: 8px;
    }

    .work-link {
      display: inline-block;
      margin-top: 10px;
      color: #fff;
      text-decoration: none;
      background: #0b57d0;
      padding: 8px 12px;
      border-radius: 8px;
    }

    .rank {
      font-size: 18px;
      font-weight: bold;
      color: #ffcc66;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <a class="toplink" href="index.html">← ガチャに戻る</a>
  <a class="toplink" href="creators.html">作者ランキング</a>

  <h1>人気ランキング</h1>

  <div id="ranking" class="grid"></div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzWLUWKFwRJjIa6QVN8XPr7xRLFfTxmI34XBYb80yvIaDuxzzDR5caWnWEB8KQTUe4E4Q/exec";

    function optimizeCloudinary(url) {
      if (!url) return "";
      if (url.includes("res.cloudinary.com") && !url.includes("f_auto")) {
        return url.replace("/upload/", "/upload/f_auto,q_auto/");
      }
      return url;
    }

    function getWorkId(work) {
      return work.id || ((work.title || "") + "_" + (work.creator || ""));
    }

    function normalizeRarity(r) {
      if (!r) return "N";
      const v = String(r).toUpperCase().trim();
      if (v === "SSR") return "SSR";
      if (v === "SR") return "SR";
      if (v === "R" || v === "RARE") return "R";
      return "N";
    }

    function getMediaType(work) {
      const type = String(work.type || "").trim();
      if (type === "video" || type === "動画") return "video";
      if (type === "image" || type === "画像") return "image";
      if (work.videoUrl) return "video";
      return "image";
    }

    function getMediaUrl(work) {
      const mediaType = getMediaType(work);

      if (mediaType === "video") {
        return optimizeCloudinary(work.videoUrl || work.file || "");
      }

      return optimizeCloudinary(work.imageUrl || work.file || "");
    }

    async function sendLike(id) {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify({
          mode: "like",
          id: id
        })
      });

      return await response.json();
    }

    async function loadRanking() {
      try {
        const res = await fetch(API_URL, { cache: "no-store" });

        if (!res.ok) {
          throw new Error("API取得失敗: " + res.status);
        }

        const raw = await res.json();
        const data = Array.isArray(raw) ? raw : (raw.items || []);

        const items = data.map((item) => ({
          ...item,
          likes: Number(item.likes || 0)
        }));

        items.sort((a, b) => b.likes - a.likes);

        const rankingDiv = document.getElementById("ranking");
        rankingDiv.innerHTML = "";

        if (!items.length) {
          rankingDiv.innerHTML = "<p>まだ作品がありません。</p>";
          return;
        }

        items.forEach((item, index) => {
          const mediaType = getMediaType(item);
          const fileUrl = getMediaUrl(item);

          const media =
            mediaType === "video"
              ? `<video src="${fileUrl}" controls playsinline preload="metadata"></video>`
              : `<img src="${fileUrl}" alt="${item.title || "作品画像"}">`;

          const linkHtml =
            item.link && item.link !== "#"
              ? `<a class="work-link" href="${item.link}" target="_blank" rel="noopener noreferrer">作品リンクへ</a>`
              : "";

          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <div class="rank">#${index + 1}</div>
            <h3>${item.title || "無題"}</h3>
            ${media}
            <div>作者: ${item.creator || "投稿者"}</div>
            <div>ジャンル: ${item.genre || ""}</div>
            <div>レアリティ: ${normalizeRarity(item.rarity)}</div>
            <div class="likes">❤️ <span class="like-value">${item.likes}</span></div>
            <button type="button" data-id="${encodeURIComponent(getWorkId(item))}">いいね</button>
            ${linkHtml}
          `;

          const button = card.querySelector("button");
          const likeValue = card.querySelector(".like-value");

          button.addEventListener("click", async () => {
            button.disabled = true;

            try {
              const result = await sendLike(decodeURIComponent(button.dataset.id));

              if (result.success) {
                likeValue.textContent = result.likes || 0;
                button.textContent = "いいね済み";
              } else {
                alert("いいねに失敗しました");
                button.disabled = false;
              }
            } catch (error) {
              console.error(error);
              alert("いいねに失敗しました");
              button.disabled = false;
            }
          });

          rankingDiv.appendChild(card);
        });
      } catch (error) {
        console.error(error);
        document.getElementById("ranking").innerHTML =
          "<p>ランキングを読み込めませんでした。</p>";
      }
    }

    loadRanking();
  </script>
</body>
</html>
