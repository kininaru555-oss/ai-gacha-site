<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ポイント購入</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="top-actions">
      <a href="index.html" class="btn-back">← トップへ戻る</a>
      <div class="user-box">
        user_id: <strong id="userIdText">読み込み中...</strong>
      </div>
    </div>

    <div class="hero">
      <h1>ポイント購入</h1>
      <p class="sub">
        ポイントを購入して、権利取得・再販売・サイト内権利購入に使えます。
      </p>
    </div>

    <div class="notice-box">
      決済は Stripe を利用します。購入後、ポイントは自動で反映されます。
    </div>

    <div class="shop-grid">
      <div class="shop-card">
        <h2>300pt</h2>
        <p>まず試したい方向けの小パックです。</p>
        <div class="shop-price">300円</div>
        <button
          type="button"
          class="buy-pack-btn"
          data-pack-id="pack_300"
          data-default-label="300pt を購入"
        >
          300pt を購入
        </button>
      </div>

      <div class="shop-card">
        <h2>1000pt</h2>
        <p>いちばん使いやすい標準パックです。</p>
        <div class="shop-price">1000円</div>
        <button
          type="button"
          class="buy-pack-btn"
          data-pack-id="pack_1000"
          data-default-label="1000pt を購入"
        >
          1000pt を購入
        </button>
      </div>

      <div class="shop-card">
        <h2>3000pt</h2>
        <p>まとめて使いたい方向けの大容量パックです。</p>
        <div class="shop-price">3000円</div>
        <button
          type="button"
          class="buy-pack-btn"
          data-pack-id="pack_3000"
          data-default-label="3000pt を購入"
        >
          3000pt を購入
        </button>
      </div>
    </div>

    <p id="statusMessage" class="status-message"></p>
  </div>

  <script>
    function getOrCreateUserId() {
      let userId = localStorage.getItem("gacha_user_id");

      if (!userId) {
        if (window.crypto && typeof window.crypto.randomUUID === "function") {
          userId = "user_" + window.crypto.randomUUID();
        } else {
          userId = "user_" + Date.now() + "_" + Math.floor(Math.random() * 1000000);
        }
        localStorage.setItem("gacha_user_id", userId);
      }

      return userId;
    }

    function setStatus(message, type = "") {
      const statusEl = document.getElementById("statusMessage");
      statusEl.textContent = message;
      statusEl.className = "status-message";

      if (type) {
        statusEl.classList.add(type);
      }
    }

    function setButtonLoading(buttonEl, isLoading, loadingText = "移動中...") {
      if (!buttonEl) return;

      const defaultLabel =
        buttonEl.dataset.defaultLabel || buttonEl.textContent || "購入する";

      if (isLoading) {
        buttonEl.disabled = true;
        buttonEl.textContent = loadingText;
      } else {
        buttonEl.disabled = false;
        buttonEl.textContent = defaultLabel;
      }
    }

    async function buyPointPack(packId, buttonEl) {
      const userId = getOrCreateUserId();

      setButtonLoading(buttonEl, true, "移動中...");
      setStatus("Stripe決済ページを準備しています...");

      try {
        const res = await fetch("/api/stripe/create-checkout-session", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            user_id: userId,
            pack_id: packId
          })
        });

        const data = await res.json();

        if (!res.ok) {
          setStatus(data.detail || "決済ページの生成に失敗しました。", "error");
          setButtonLoading(buttonEl, false);
          return;
        }

        if (!data.url) {
          setStatus("決済URLの取得に失敗しました。", "error");
          setButtonLoading(buttonEl, false);
          return;
        }

        setStatus("Stripeへ移動します...");
        window.location.href = data.url;
      } catch (error) {
        setStatus("通信に失敗しました。", "error");
        setButtonLoading(buttonEl, false);
      }
    }

    function reflectPaymentStatusFromQuery() {
      const url = new URL(window.location.href);
      const payment = url.searchParams.get("payment");

      if (payment === "success") {
        setStatus(
          "決済が完了しました。ポイント反映まで少し待ってから確認してください。",
          "success"
        );
      } else if (payment === "cancel") {
        setStatus("決済はキャンセルされました。", "error");
      }
    }

    function bindPackButtons() {
      const buttons = document.querySelectorAll(".buy-pack-btn");

      buttons.forEach((button) => {
        button.addEventListener("click", () => {
          const packId = button.dataset.packId;

          if (!packId) {
            setStatus("pack_id が見つかりません。", "error");
            return;
          }

          buyPointPack(packId, button);
        });
      });
    }

    function renderUserId() {
      const userId = getOrCreateUserId();
      const userIdText = document.getElementById("userIdText");
      if (userIdText) {
        userIdText.textContent = userId;
      }
    }

    function initPointShop() {
      renderUserId();
      bindPackButtons();
      reflectPaymentStatusFromQuery();
    }

    document.addEventListener("DOMContentLoaded", initPointShop);
  </script>
</body>
</html>
