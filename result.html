<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ガチャ結果</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f0f12;
      color: #fff;
    }

    .container {
      max-width: 460px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: #1b1b1f;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 16px;
    }

    .stage {
      width: 100%;
      aspect-ratio: 3/4;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }

    img, video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: gold;
      color: #000;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .title {
      font-size: 18px;
      margin-top: 10px;
      font-weight: bold;
    }

    .sub {
      color: #aaa;
      font-size: 13px;
    }

    .meta {
      margin-top: 10px;
      font-size: 14px;
      line-height: 1.7;
    }

    .meta span {
      display: inline-block;
      margin-right: 10px;
    }

    .buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    button {
      flex: 1;
      border: none;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    .primary { background: #2563eb; color: #fff; }
    .like { background: #e91e63; color: #fff; }
    .share { background: #222; color: #fff; }
    .market { background: #16a34a; color: #fff; }

    .notice {
      margin-top: 12px;
      font-size: 13px;
      color: #bbb;
      background: #111;
      padding: 10px;
      border-radius: 10px;
    }

    .highlight {
      color: #4ade80;
      font-weight: bold;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- 🔥 メインカード -->
  <div class="card">
    <div class="stage">
      <img id="resultImage" style="display:none;">
      <video id="resultVideo" style="display:none;" controls></video>
      <div id="rarityBadge" class="badge"></div>
    </div>

    <div class="title" id="title"></div>
    <div class="sub" id="creator"></div>

    <div class="meta" id="stats"></div>

    <!-- 🔥 状態メッセージ -->
    <div class="notice" id="resultMessage"></div>

    <!-- 🔥 ボタン -->
    <div class="buttons">
      <button class="like" id="likeButton">いいね</button>
      <button class="share" id="shareButton">X共有</button>
      <button class="market" id="offerButton">オファー</button>
      <button class="primary" id="battleButton">バトル</button>
    </div>
  </div>

  <!-- 🔥 宣伝ゾーン -->
  <div class="card">
    <div style="font-weight:bold;">作者リンク</div>

    <div class="buttons">
      <button id="linkButton">作者ページ</button>
      <button id="snsButton">X</button>
      <button id="shopButton">BOOTH</button>
    </div>

    <div id="promoText" class="notice"></div>
  </div>

</div>

<script>

let currentWork = null;
let userId = localStorage.getItem("user_id");

// 🔥 URLから取得
const params = new URLSearchParams(location.search);
const workData = params.get("data");

if (workData) {
  const work = JSON.parse(decodeURIComponent(workData));
  render(work);
}

function render(work) {
  currentWork = work;

  // 画像 or 動画
  if (work.video_url) {
    const v = document.getElementById("resultVideo");
    v.src = work.video_url;
    v.style.display = "block";
  } else {
    const i = document.getElementById("resultImage");
    i.src = work.image_url;
    i.style.display = "block";
  }

  // レア
  document.getElementById("rarityBadge").textContent = work.rarity;

  // タイトル
  document.getElementById("title").textContent = work.title;
  document.getElementById("creator").textContent = work.creator_name;

  // ステータス
  document.getElementById("stats").innerHTML = `
    <span>HP:${work.hp}</span>
    <span>ATK:${work.atk}</span>
    <span>DEF:${work.def}</span>
  `;

  // 🔥 状態分岐
  if (work.is_new_owner) {
    document.getElementById("resultMessage").innerHTML =
      `<span class="highlight">初発見！あなたが所有者です</span><br>+${work.exp} EXP`;
  } else {
    document.getElementById("resultMessage").innerHTML =
      `既に所有されています<br>+${work.exp} EXP`;
  }

  // 宣伝
  document.getElementById("promoText").textContent = work.description || "";

  // 外部リンク
  document.getElementById("linkButton").onclick = () => {
    window.open(work.link_url);
  };

  // シェア
  document.getElementById("shareButton").onclick = () => {
    const text = `神引きした\n${work.title}\n#美女ガチャ`;
    const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
    window.open(url);
  };

  // いいね
  document.getElementById("likeButton").onclick = async () => {
    await fetch(`/works/${work.id}/like`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        user_id: userId,
        work_id: work.id
      })
    });
    alert("いいね！");
  };

  // バトル
  document.getElementById("battleButton").onclick = async () => {
    await fetch(`/battle/entry`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        user_id: userId,
        work_id: work.id
      })
    });
    alert("バトル参加！");
  };

  // 🔥 オファー
  document.getElementById("offerButton").onclick = () => {
    const price = prompt("いくらでオファーする？（ポイント）");
    if (!price) return;

    fetch(`/offers`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        from_user_id: userId,
        work_id: work.id,
        points: Number(price)
      })
    });

    alert("オファー送信！");
  };
}

</script>

</body>
</html>
