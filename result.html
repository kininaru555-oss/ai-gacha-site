<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ガチャ結果</title>
  <style>
    /* 既存スタイルを維持しつつ、追加・微調整 */
    .message.loading { color: #9ca3af; background: transparent; border: none; text-align: center; padding: 40px 0; }
    .message.error { color: #ff6b6b; border-color: #ff6b6b; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .liked { background: #9f1239 !important; } /* いいね済み時の色例 */
  </style>
</head>
<body>
  <div class="container">

    <div class="card">
      <div class="stage">
        <img id="resultImage" style="display:none;" alt="結果画像" loading="lazy" />
        <video id="resultVideo" style="display:none;" controls playsinline preload="metadata"></video>
      </div>

      <div class="badge-row">
        <div id="rarityBadge" class="badge">N</div>
        <div id="ownerBadge" class="badge">所有者: -</div>
        <div id="expBadge" class="badge">EXP +0</div>
      </div>

      <div id="title" class="title">ガチャ結果</div>
      <div id="sub" class="sub">読み込み中...</div>
      <div id="resultMessage" class="message">結果を確認しています...</div>

      <div id="meta" class="meta"></div>

      <div class="buttons">
        <button id="shareButton" class="btn-share">Xで共有</button>
        <button id="likeButton" class="btn-like">いいね</button>
        <button id="battleButton" class="btn-battle">バトル参加</button>
        <a id="authorLinkButton" href="#" target="_blank" rel="noopener noreferrer" class="btn-link">作者ページ</a>
      </div>

      <div id="offerArea" class="offer-box" style="display:none;">
        <input id="offerPointInput" type="number" min="10" placeholder="オファーpt 例: 100" />
        <button id="offerButton" class="btn-link">所有者にオファー送信</button>
      </div>

      <div id="systemMessage" class="system-message"></div>
    </div>

    <div class="card">
      <h3>作品説明 / 宣伝</h3>
      <div id="description" class="desc">説明なし</div>
    </div>

    <div class="card">
      <div class="buttons">
        <a href="index.html" class="btn-nav">ガチャに戻る</a>
        <a href="mypage.html" class="btn-nav">マイページ</a>
        <a href="market.html" class="btn-nav">公開売却</a>
      </div>
    </div>

  </div>

  <script>
    const API_BASE = "http://127.0.0.1:8000";
    const RESULT_STORAGE_KEY = "gacha_last_result";
    const AUTH_STORAGE_KEY = "gacha_app_auth_v1";

    // DOM要素まとめ
    const els = {
      resultImage: document.getElementById("resultImage"),
      resultVideo: document.getElementById("resultVideo"),
      rarityBadge: document.getElementById("rarityBadge"),
      ownerBadge: document.getElementById("ownerBadge"),
      expBadge: document.getElementById("expBadge"),
      title: document.getElementById("title"),
      sub: document.getElementById("sub"),
      resultMessage: document.getElementById("resultMessage"),
      meta: document.getElementById("meta"),
      description: document.getElementById("description"),
      authorLinkButton: document.getElementById("authorLinkButton"),
      shareButton: document.getElementById("shareButton"),
      likeButton: document.getElementById("likeButton"),
      battleButton: document.getElementById("battleButton"),
      offerArea: document.getElementById("offerArea"),
      offerPointInput: document.getElementById("offerPointInput"),
      offerButton: document.getElementById("offerButton"),
      systemMessage: document.getElementById("systemMessage"),
    };

    let authUser = null;
    let payload = null;
    let isLiked = false;

    function getStored(key) {
      try { return JSON.parse(localStorage.getItem(key)); } catch { return null; }
    }

    function showMessage(text, isError = false) {
      els.systemMessage.textContent = text;
      els.systemMessage.style.color = isError ? "#ff6b6b" : "#4ade80";
      els.systemMessage.classList.add("show");
    }

    async function api(path, options = {}) {
      const headers = {
        "Content-Type": "application/json",
        ...(authUser?.token ? { "Authorization": `Bearer ${authUser.token}` } : {}),
        ...(options.headers || {}),
      };

      const res = await fetch(`\( {API_BASE} \){path}`, { ...options, headers });
      let data;
      try { data = await res.json(); } catch { data = {}; }

      if (!res.ok) throw new Error(data.detail || data.message || `エラー (${res.status})`);
      return data;
    }

    function renderMedia(result) {
      if (result?.type === "video" && result.video_url) {
        els.resultVideo.src = result.video_url;
        els.resultVideo.style.display = "block";
        els.resultImage.style.display = "none";
      } else if (result?.image_url) {
        els.resultImage.src = result.image_url;
        els.resultImage.style.display = "block";
        els.resultVideo.style.display = "none";
      } else {
        els.resultMessage.textContent = "メディア読み込みに失敗しました";
        els.resultMessage.classList.add("error");
      }
    }

    function renderMeta(result) {
      const stats = [
        { label: "HP",  value: result.hp  },
        { label: "ATK", value: result.atk },
        { label: "DEF", value: result.def },
        { label: "SPD", value: result.spd },
        { label: "LUK", value: result.luk },
        { label: "総排出", value: result.draw_count ?? 0 },
      ];

      els.meta.innerHTML = stats.map(s => `
        <div class="meta-item">
          <span>${s.label}</span>
          <strong>${s.value ?? "-"}</strong>
        </div>
      `).join("");
    }

    async function renderPage() {
      if (!payload?.result) {
        els.resultMessage.textContent = "ガチャ結果が見つかりません。もう一度引いてください。";
        els.resultMessage.classList.add("error");
        els.offerArea.style.display = "none";
        return;
      }

      const result = payload.result;
      const info = payload.info || {};

      renderMedia(result);
      renderMeta(result);

      els.rarityBadge.textContent = result.rarity || "N";
      els.ownerBadge.textContent = `所有者: ${info.owner_user_id || "不明"}`;
      els.expBadge.textContent = `EXP +${info.exp_gained || 0}`;
      els.title.textContent = result.title || "ガチャ結果";
      els.sub.textContent = `${result.creator_name || "匿名"} / ${result.genre || "未分類"} / ${result.type === "video" ? "動画" : "画像"}`;
      els.description.textContent = result.description || "この作品には詳細な説明がありません。";

      if (info.is_new_owner) {
        els.resultMessage.innerHTML = `初発見！あなたがこの作品の新しい所有者になりました🎉<br>EXP +${info.exp_gained || 0} を獲得`;
        els.offerArea.style.display = "none";
      } else {
        els.resultMessage.innerHTML = `既所有作品でした。<br>所有権は移動しませんが、EXP +${info.exp_gained || 0} を獲得しました！`;
        els.offerArea.style.display = "grid";
      }

      if (result.link_url) {
        els.authorLinkButton.href = result.link_url;
      } else {
        els.authorLinkButton.style.opacity = "0.5";
        els.authorLinkButton.style.pointerEvents = "none";
      }

      // いいね状態チェック（簡易版：localStorageで仮管理。本来はAPIで取得）
      const likedWorks = getStored("liked_works") || [];
      if (likedWorks.includes(result.id)) {
        isLiked = true;
        els.likeButton.textContent = "いいね済み";
        els.likeButton.classList.add("liked");
        els.likeButton.disabled = true;
      }
    }

    function shareToX() {
      if (!payload?.result) return;
      const result = payload.result;
      const info = payload.info || {};
      const text = `【\( {result.rarity || "N"}】 \){result.title || "美女ガチャ結果"}\n\( {info.is_new_owner ? "初所有GET！" : "既所有発見"} EXP+ \){info.exp_gained || 0}\n#美女ガチャクエスト #AIガチャ`;
      const shareUrl = `https://twitter.com/intent/tweet?text=\( {encodeURIComponent(text)}&url= \){encodeURIComponent(window.location.href)}`;
      window.open(shareUrl, "_blank", "noopener,noreferrer");
    }

    async function likeCurrent() {
      if (!payload?.result?.id || !authUser?.user_id) return showMessage("ログインが必要です", true);

      try {
        const data = await api(`/works/${payload.result.id}/like`, {
          method: "POST",
          body: JSON.stringify({ user_id: authUser.user_id })
        });
        showMessage(data.message || "いいねしました！");

        // 簡易的にUI更新
        isLiked = true;
        els.likeButton.textContent = "いいね済み";
        els.likeButton.classList.add("liked");
        els.likeButton.disabled = true;

        // localStorageに記録（永続化）
        const liked = getStored("liked_works") || [];
        if (!liked.includes(payload.result.id)) {
          liked.push(payload.result.id);
          localStorage.setItem("liked_works", JSON.stringify(liked));
        }
      } catch (err) {
        showMessage(err.message || "いいねに失敗しました", true);
      }
    }

    async function battleCurrent() {
      if (!payload?.result?.id || !authUser?.user_id) return showMessage("ログインが必要です", true);

      try {
        const data = await api(`/battle/entry`, {
          method: "POST",
          body: JSON.stringify({ user_id: authUser.user_id, work_id: payload.result.id })
        });
        showMessage(data.message || "バトルに参加しました！");
      } catch (err) {
        showMessage(err.message || "バトル参加に失敗しました", true);
      }
    }

    async function sendOffer() {
      if (!payload?.result?.id || !authUser?.user_id) return showMessage("ログインが必要です", true);

      const points = Number(els.offerPointInput.value);
      const ownerId = payload.info?.owner_user_id;

      if (!ownerId) return showMessage("所有者情報がありません", true);
      if (ownerId === authUser.user_id) return showMessage("自分の作品にはオファーできません", true);
      if (points < 10) return showMessage("オファーは10pt以上でお願いします", true);

      // ポイント残高チェック（オプション：user情報を事前に持っていれば）
      // if (authUser.points < points) return showMessage("ポイントが不足しています", true);

      try {
        const data = await api("/offers", {
          method: "POST",
          body: JSON.stringify({
            from_user_id: authUser.user_id,
            to_user_id: ownerId,
            work_id: payload.result.id,
            offer_points: points
          })
        });
        showMessage(data.message || "オファーを送信しました！");
        els.offerPointInput.value = "";
      } catch (err) {
        showMessage(err.message || "オファー送信に失敗しました", true);
      }
    }

    function init() {
      authUser = getStored(AUTH_STORAGE_KEY);
      payload = getStored(RESULT_STORAGE_KEY);

      if (!authUser?.user_id) {
        showMessage("ログイン情報がありません。ガチャ画面に戻ってログインしてください。", true);
        els.offerArea.style.display = "none";
      }

      renderPage();

      els.shareButton.addEventListener("click", shareToX);
      els.likeButton.addEventListener("click", likeCurrent);
      els.battleButton.addEventListener("click", battleCurrent);
      els.offerButton.addEventListener("click", sendOffer);
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
  </html>
