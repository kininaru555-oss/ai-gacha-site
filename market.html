<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>公開売却ページ</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f1115;
      color: #fff;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 16px;
    }

    .top-links {
      display: grid;
      grid-template-columns: repeat(5, minmax(0,1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .top-links a {
      background: #374151;
      color: #fff;
      text-decoration: none;
      text-align: center;
      padding: 12px;
      border-radius: 12px;
      font-weight: bold;
      border: 1px solid transparent;
    }

    .top-links a.active {
      background: #2563eb;
      border-color: rgba(255,255,255,0.18);
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 16px;
      background: #171a21;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 12px;
    }

    .toolbar label {
      font-size: 13px;
      color: #aeb5c2;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .toolbar select,
    .toolbar input[type="checkbox"] {
      accent-color: #2563eb;
    }

    .toolbar select {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      background: #101218;
      color: #fff;
    }

    .message {
      display: none;
      margin-bottom: 16px;
      background: #101218;
      border-radius: 12px;
      padding: 12px;
      font-size: 13px;
      line-height: 1.7;
      border: 1px solid rgba(255,255,255,0.06);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.show {
      display: block;
    }

    .market-note {
      margin-bottom: 16px;
      background: #171a21;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 14px;
      color: #cfd6e2;
      font-size: 13px;
      line-height: 1.8;
    }

    .list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 14px;
    }

    .item {
      background: #171a21;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 12px 24px rgba(0,0,0,0.18);
    }

    .thumb {
      width: 100%;
      aspect-ratio: 3/4;
      background: #090b10;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .thumb img,
    .thumb video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #000;
    }

    .thumb-fallback {
      color: #9ca3af;
      font-size: 12px;
      padding: 14px;
      text-align: center;
      line-height: 1.6;
    }

    .body {
      padding: 14px;
    }

    .title {
      font-size: 17px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .muted {
      color: #aeb5c2;
      font-size: 13px;
      line-height: 1.8;
    }

    .price {
      margin-top: 10px;
      font-size: 22px;
      font-weight: bold;
      color: #4ade80;
    }

    .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      background: #263042;
      font-size: 12px;
      font-weight: bold;
    }

    .badge.legend {
      background: #f59e0b;
      color: #111827;
    }

    .badge.power {
      background: #7c3aed;
    }

    .badge.wins {
      background: #16a34a;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .stat-box {
      background: #101218;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 10px;
    }

    .stat-box span {
      display: block;
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 4px;
    }

    .stat-box strong {
      font-size: 14px;
    }

    .buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button, a {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      text-decoration: none;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .btn-buy { background: #16a34a; }
    .btn-offer { background: #db2777; }
    .btn-link { background: #2563eb; }
    .btn-disabled {
      background: #4b5563;
      cursor: default;
      opacity: 0.75;
    }

    .empty {
      color: #9ca3af;
      font-size: 14px;
      padding: 10px 0;
      line-height: 1.8;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 999;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      width: 100%;
      max-width: 420px;
      background: #171a21;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 16px;
    }

    .modal-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .modal-sub {
      color: #aeb5c2;
      font-size: 13px;
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .modal input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: #101218;
      color: #fff;
      margin-bottom: 12px;
    }

    @media (max-width: 900px) {
      .top-links {
        grid-template-columns: repeat(3, minmax(0,1fr));
      }
    }

    @media (max-width: 720px) {
      .top-links {
        grid-template-columns: repeat(2, minmax(0,1fr));
      }

      .stats-grid {
        grid-template-columns: repeat(2, minmax(0,1fr));
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="top-links">
      <a href="index.html">ガチャ</a>
      <a href="result.html">結果</a>
      <a href="mypage.html">マイページ</a>
      <a href="ranking.html">ランキング</a>
      <a href="upload.html">作品投稿</a>
    </div>

    <div class="market-note">
      マーケットでは、作品の所有権だけでなく <strong>育成済みカード個体</strong> もそのまま取引されます。<br>
      レベル、勝利数、累計EXP、戦闘力、レジェンド化状態が価値に反映されます。<br>
      取引成立時の分配は <strong>運営 30% / 所有者 35% / クリエイター 35%</strong> です。
    </div>

    <div class="toolbar">
      <label for="sortSelect">並び替え</label>
      <select id="sortSelect">
        <option value="new">新着順</option>
        <option value="price_asc">価格が安い順</option>
        <option value="price_desc">価格が高い順</option>
        <option value="level_desc">レベルが高い順</option>
        <option value="wins_desc">勝利数が多い順</option>
        <option value="power_desc">戦闘力が高い順</option>
        <option value="total_exp_desc">累計EXPが多い順</option>
      </select>

      <label for="hideMineCheckbox">
        <input id="hideMineCheckbox" type="checkbox" />
        自分の出品を非表示
      </label>
    </div>

    <div id="systemMessage" class="message"></div>

    <div id="listingList" class="list"></div>
  </div>

  <div id="offerModalOverlay" class="modal-overlay" aria-hidden="true">
    <div class="modal">
      <div class="modal-title">オファー送信</div>
      <div class="modal-sub">30pt以上の整数で入力してください。送信者や宛先はサーバー側で確定する必要があります。</div>
      <input id="offerPointsInput" type="number" min="30" step="1" inputmode="numeric" placeholder="例: 100" />
      <div class="buttons">
        <button id="offerConfirmButton" class="btn-offer" type="button">送信する</button>
        <button id="offerCancelButton" class="btn-disabled" type="button">キャンセル</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    const API_BASE = window.APP_CONFIG?.API_BASE || "";
    const AUTH_STORAGE_KEY = window.APP_CONFIG?.AUTH_STORAGE_KEY || "auth";

    const listingList = document.getElementById("listingList");
    const systemMessage = document.getElementById("systemMessage");
    const sortSelect = document.getElementById("sortSelect");
    const hideMineCheckbox = document.getElementById("hideMineCheckbox");

    const offerModalOverlay = document.getElementById("offerModalOverlay");
    const offerPointsInput = document.getElementById("offerPointsInput");
    const offerConfirmButton = document.getElementById("offerConfirmButton");
    const offerCancelButton = document.getElementById("offerCancelButton");

    let authUser = null;
    let rawListings = [];
    let busyKeys = new Set();
    let offerTarget = null;
    let videosObserver = null;

    function readAuth() {
      try {
        const raw = localStorage.getItem(AUTH_STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }

    function getAuthToken(auth) {
      if (!auth || typeof auth !== "object") return "";
      return auth.access_token || auth.token || auth.id_token || "";
    }

    function getAuthHeaders(extraHeaders = {}) {
      const token = getAuthToken(authUser);
      const headers = {
        "Content-Type": "application/json",
        ...extraHeaders
      };
      if (token) {
        headers["Authorization"] = `Bearer ${token}`;
      }
      return headers;
    }

    function showMessage(text) {
      systemMessage.textContent = text;
      systemMessage.classList.add("show");
    }

    function clearMessage() {
      systemMessage.textContent = "";
      systemMessage.classList.remove("show");
    }

    async function api(path, options = {}) {
      const res = await fetch(`${API_BASE}${path}`, {
        method: options.method || "GET",
        headers: getAuthHeaders(options.headers || {}),
        credentials: "include",
        body: options.body
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data.detail || data.message || "APIエラー");
      }
      return data;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    function isHttpUrl(value) {
      return typeof value === "string" && /^https?:\/\//i.test(value);
    }

    function beginBusy(key) {
      if (busyKeys.has(key)) return false;
      busyKeys.add(key);
      return true;
    }

    function endBusy(key) {
      busyKeys.delete(key);
    }

    function formatPoints(value) {
      const n = Number(value || 0);
      return Number.isFinite(n) ? `${n.toLocaleString("ja-JP")} pt` : "0 pt";
    }

    function getCardPower(item) {
      if (typeof item.card_power === "number") return item.card_power;
      if (typeof item.power === "number") return item.power;
      return (
        Number(item.hp || 0) +
        Number(item.atk || 0) +
        Number(item.def ?? item.defense || 0) +
        Number(item.spd || 0) +
        Number(item.luk || 0)
      );
    }

    function sortListings(items, mode) {
      const copied = [...items];

      switch (mode) {
        case "price_asc":
          copied.sort((a, b) => (a.price_points || 0) - (b.price_points || 0));
          break;
        case "price_desc":
          copied.sort((a, b) => (b.price_points || 0) - (a.price_points || 0));
          break;
        case "level_desc":
          copied.sort((a, b) => (b.level || 0) - (a.level || 0));
          break;
        case "wins_desc":
          copied.sort((a, b) => (b.win_count || 0) - (a.win_count || 0));
          break;
        case "power_desc":
          copied.sort((a, b) => getCardPower(b) - getCardPower(a));
          break;
        case "total_exp_desc":
          copied.sort((a, b) => (b.total_exp || 0) - (a.total_exp || 0));
          break;
        case "new":
        default:
          copied.sort((a, b) => (b.listing_id || 0) - (a.listing_id || 0));
          break;
      }

      return copied;
    }

    function mediaHtml(item) {
      if (item.video_url && isHttpUrl(item.video_url)) {
        const poster = isHttpUrl(item.thumbnail_url) ? ` poster="${escapeAttr(item.thumbnail_url)}"` : "";
        return `<video class="js-lazy-video" data-src="${escapeAttr(item.video_url)}" muted playsinline preload="none"${poster}></video>`;
      }

      if (item.image_url && isHttpUrl(item.image_url)) {
        return `<img src="${escapeAttr(item.image_url)}" alt="${escapeAttr(item.title || "カード画像")}" loading="lazy" />`;
      }

      if (item.thumbnail_url && isHttpUrl(item.thumbnail_url)) {
        return `<img src="${escapeAttr(item.thumbnail_url)}" alt="${escapeAttr(item.title || "カード画像")}" loading="lazy" />`;
      }

      return `<div class="thumb-fallback">メディアなし</div>`;
    }

    function renderListings(items) {
      if (!items.length) {
        listingList.innerHTML = `
          <div class="empty">
            現在、出品中の作品はありません。<br>
            <a href="mypage.html" style="color:#93c5fd;text-decoration:underline;">マイページから出品しよう</a>
          </div>
        `;
        return;
      }

      listingList.innerHTML = items.map(item => {
        const currentUserId = authUser?.user_id || "";
        const sellerId = item.seller_user_id || "";
        const isMine = currentUserId && sellerId === currentUserId;
        const sellerLabel = item.seller_name || sellerId || "不明";
        const cardPower = getCardPower(item);

        return `
          <div class="item">
            <div class="thumb">
              ${mediaHtml(item)}
            </div>

            <div class="body">
              <div class="badge-row">
                <div class="badge">${escapeHtml(item.rarity || "N")}</div>
                ${item.is_legend ? `<div class="badge legend">LEGEND</div>` : ""}
                <div class="badge">Lv ${escapeHtml(item.level ?? 1)}</div>
                <div class="badge wins">勝利 ${escapeHtml(item.win_count ?? 0)}</div>
                <div class="badge power">戦闘力 ${escapeHtml(cardPower)}</div>
              </div>

              <div class="title">${escapeHtml(item.title || "無題")}</div>

              <div class="muted">
                作者: ${escapeHtml(item.creator_name || "不明")}<br>
                出品者: ${escapeHtml(sellerLabel)}<br>
                総排出: ${escapeHtml(item.draw_count ?? 0)}<br>
                累計EXP: ${escapeHtml(item.total_exp ?? 0)} / 総バトル: ${escapeHtml(item.battle_count ?? 0)}
              </div>

              <div class="stats-grid">
                <div class="stat-box">
                  <span>HP</span>
                  <strong>${escapeHtml(item.hp ?? "-")}</strong>
                </div>
                <div class="stat-box">
                  <span>ATK</span>
                  <strong>${escapeHtml(item.atk ?? "-")}</strong>
                </div>
                <div class="stat-box">
                  <span>DEF</span>
                  <strong>${escapeHtml(item.def ?? item.defense ?? "-")}</strong>
                </div>
                <div class="stat-box">
                  <span>SPD</span>
                  <strong>${escapeHtml(item.spd ?? "-")}</strong>
                </div>
                <div class="stat-box">
                  <span>LUK</span>
                  <strong>${escapeHtml(item.luk ?? "-")}</strong>
                </div>
                <div class="stat-box">
                  <span>現在EXP</span>
                  <strong>${escapeHtml(item.exp ?? 0)}</strong>
                </div>
              </div>

              <div class="price">${formatPoints(item.price_points)}</div>

              <div class="muted">
                取引成立時：運営 30% ／ 所有者 35% ／ クリエイター 35%
              </div>

              <div class="buttons">
                ${
                  isMine
                    ? `<button class="btn-disabled" type="button" disabled>自分の出品</button>`
                    : `<button class="btn-buy js-buy" data-listing-id="${escapeAttr(item.listing_id)}" type="button">購入</button>`
                }
                ${
                  isMine
                    ? ``
                    : `<button class="btn-offer js-offer" data-work-id="${escapeAttr(item.work_id)}" data-listing-id="${escapeAttr(item.listing_id)}" type="button">オファー</button>`
                }
                ${
                  item.link_url
                    ? `<a class="btn-link" href="${escapeAttr(item.link_url)}" target="_blank" rel="noopener noreferrer">作者リンク</a>`
                    : ``
                }
              </div>
            </div>
          </div>
        `;
      }).join("");

      bindMediaFallbacks();
      setupLazyVideos();
    }

    function bindMediaFallbacks() {
      listingList.querySelectorAll("img").forEach((img) => {
        img.onerror = () => {
          const parent = img.parentElement;
          if (!parent) return;
          parent.innerHTML = `<div class="thumb-fallback">画像を読み込めませんでした</div>`;
        };
      });

      listingList.querySelectorAll("video").forEach((video) => {
        video.onerror = () => {
          const parent = video.parentElement;
          if (!parent) return;
          parent.innerHTML = `<div class="thumb-fallback">動画を読み込めませんでした</div>`;
        };
      });
    }

    function setupLazyVideos() {
      if (videosObserver) {
        videosObserver.disconnect();
        videosObserver = null;
      }

      const videos = listingList.querySelectorAll(".js-lazy-video");
      if (!videos.length) return;

      if (!("IntersectionObserver" in window)) {
        videos.forEach((video) => {
          const src = video.dataset.src;
          if (src) {
            video.src = src;
            video.setAttribute("preload", "metadata");
          }
        });
        return;
      }

      videosObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (!entry.isIntersecting) return;
          const video = entry.target;
          const src = video.dataset.src;
          if (src && !video.src) {
            video.src = src;
            video.setAttribute("preload", "metadata");
          }
          videosObserver.unobserve(video);
        });
      }, { rootMargin: "200px 0px" });

      videos.forEach((video) => videosObserver.observe(video));
    }

    function applyRender() {
      const mode = sortSelect.value || "new";
      let items = [...rawListings];

      if (hideMineCheckbox.checked && authUser?.user_id) {
        items = items.filter((item) => item.seller_user_id !== authUser.user_id);
      }

      const sorted = sortListings(items, mode);
      renderListings(sorted);
    }

    async function loadListings() {
      clearMessage();

      try {
        const data = await api("/market/listings");
        rawListings = data.items || [];
        applyRender();
      } catch (error) {
        showMessage(error.message || "マーケットの読み込みに失敗しました。");
      }
    }

    async function buyItem(listingId) {
      if (!authUser || !getAuthToken(authUser)) {
        showMessage("購入にはログインが必要です。トップページからログインしてください。");
        return;
      }

      const key = `buy:${listingId}`;
      if (!beginBusy(key)) return;

      try {
        const data = await api("/market/buy", {
          method: "POST",
          body: JSON.stringify({
            listing_id: Number(listingId)
          })
        });
        showMessage(data.message || "購入しました。");
        await loadListings();
      } catch (error) {
        showMessage(error.message || "購入に失敗しました。");
      } finally {
        endBusy(key);
      }
    }

    function openOfferModal(workId, listingId) {
      offerTarget = {
        workId: Number(workId),
        listingId: Number(listingId)
      };
      offerPointsInput.value = "";
      offerModalOverlay.classList.add("show");
      offerModalOverlay.setAttribute("aria-hidden", "false");
      offerPointsInput.focus();
    }

    function closeOfferModal() {
      offerTarget = null;
      offerPointsInput.value = "";
      offerModalOverlay.classList.remove("show");
      offerModalOverlay.setAttribute("aria-hidden", "true");
    }

    async function confirmOffer() {
      if (!authUser || !getAuthToken(authUser)) {
        showMessage("オファーにはログインが必要です。");
        return;
      }
      if (!offerTarget) return;

      const offerPoints = Number(offerPointsInput.value || 0);
      if (!Number.isInteger(offerPoints) || offerPoints < 30) {
        showMessage("オファーは30pt以上の整数で送信してください。");
        return;
      }

      const key = `offer:${offerTarget.listingId}`;
      if (!beginBusy(key)) return;

      try {
        const data = await api("/offers", {
          method: "POST",
          body: JSON.stringify({
            work_id: offerTarget.workId,
            offer_points: offerPoints
          })
        });
        showMessage(data.message || "オファーを送信しました。");
        closeOfferModal();
      } catch (error) {
        showMessage(error.message || "オファー送信に失敗しました。");
      } finally {
        endBusy(key);
      }
    }

    function bindListingDelegation() {
      listingList.addEventListener("click", async (e) => {
        const buyBtn = e.target.closest(".js-buy");
        if (buyBtn) {
          const listingId = buyBtn.dataset.listingId;
          if (listingId) {
            await buyItem(listingId);
          }
          return;
        }

        const offerBtn = e.target.closest(".js-offer");
        if (offerBtn) {
          const workId = offerBtn.dataset.workId;
          const listingId = offerBtn.dataset.listingId;
          if (workId && listingId) {
            openOfferModal(workId, listingId);
          }
        }
      });
    }

    function bindOfferModal() {
      offerConfirmButton.addEventListener("click", confirmOffer);
      offerCancelButton.addEventListener("click", closeOfferModal);

      offerModalOverlay.addEventListener("click", (e) => {
        if (e.target === offerModalOverlay) {
          closeOfferModal();
        }
      });

      offerPointsInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          confirmOffer();
        } else if (e.key === "Escape") {
          closeOfferModal();
        }
      });
    }

    function boot() {
      authUser = readAuth();

      sortSelect.addEventListener("change", applyRender);
      hideMineCheckbox.addEventListener("change", applyRender);

      bindListingDelegation();
      bindOfferModal();

      loadListings();
    }

    document.addEventListener("DOMContentLoaded", boot);
  </script>
</body>
</html>
