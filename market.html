<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マーケット</title>

<style>
body { background:#0f0f12; color:#fff; font-family:sans-serif; }
.container { max-width:480px; margin:auto; padding:16px; }
.card { background:#1b1b1f; padding:14px; border-radius:14px; margin-bottom:16px; }
.item { padding:10px; border-bottom:1px solid #333; }
button { margin-top:6px; padding:8px; border:none; border-radius:8px; background:#2563eb; color:#fff; }
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h3>🛒 公開マーケット</h3>
    <div id="marketList"></div>
  </div>
</div>

<script>

const API = "http://127.0.0.1:8000";
const userId = localStorage.getItem("user_id");

async function loadMarket() {
  const res = await fetch(`${API}/market/listings`);
  const data = await res.json();

  const el = document.getElementById("marketList");
  el.innerHTML = "";

  data.forEach(m => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <div>${m.title}</div>
      <div>${m.price}pt</div>
      <button onclick="buy(${m.id})">購入</button>
    `;
    el.appendChild(div);
  });
}

async function buy(id) {
  await fetch(`${API}/market/buy`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      buyer_user_id: userId,
      listing_id: id
    })
  });

  alert("購入完了");
  loadMarket();
}

loadMarket();

</script>

</body>
</html>
