<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>公開売却ページ</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f1115;
      color: #fff;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px;
    }

    .top-links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .top-links a {
      background: #374151;
      color: #fff;
      text-decoration: none;
      text-align: center;
      padding: 12px;
      border-radius: 12px;
      font-weight: bold;
    }

    .message {
      display: none;
      margin-bottom: 16px;
      background: #101218;
      border-radius: 12px;
      padding: 12px;
      font-size: 13px;
      line-height: 1.7;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .message.show { display: block; }
    .message.error { border-color: #ff6b6b; color: #ff6b6b; }

    .loading {
      text-align: center;
      padding: 40px 0;
      color: #9ca3af;
      font-size: 15px;
    }

    .list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 14px;
    }

    .item {
      background: #171a21;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      overflow: hidden;
    }

    .thumb {
      width: 100%;
      aspect-ratio: 3/4;
      background: #090b10;
      position: relative;
    }

    .thumb img, .thumb video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .body {
      padding: 14px;
    }

    .title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .muted {
      color: #aeb5c2;
      font-size: 13px;
      line-height: 1.6;
    }

    .price {
      margin: 10px 0 4px;
      font-size: 20px;
      font-weight: bold;
      color: #4ade80;
    }

    .buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    button, a {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      text-decoration: none;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-buy   { background: #16a34a; }
    .btn-offer { background: #db2777; }
    .btn-link  { background: #2563eb; }
  </style>
</head>
<body>
  <div class="container">

    <div class="top-links">
      <a href="index.html">ガチャ</a>
      <a href="result.html">結果</a>
      <a href="mypage.html">マイページ</a>
    </div>

    <div id="systemMessage" class="message"></div>

    <div id="loading" class="loading">出品情報を読み込み中...</div>
    <div id="listingList" class="list" style="display:none;"></div>

  </div>

  <script>
    const API_BASE = "http://127.0.0.1:8000";
    const AUTH_STORAGE_KEY = "gacha_app_auth_v1";

    const els = {
      message: document.getElementById("systemMessage"),
      loading: document.getElementById("loading"),
      list: document.getElementById("listingList"),
    };

    let authUser = null;

    function getAuth() {
      try {
        const raw = localStorage.getItem(AUTH_STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }

    function showMessage(text, isError = false) {
      els.message.textContent = text;
      els.message.className = "message show" + (isError ? " error" : "");
    }

    async function api(path, options = {}) {
      const headers = {
        "Content-Type": "application/json",
        ...(authUser?.token ? { "Authorization": `Bearer ${authUser.token}` } : {}),
        ...(options.headers || {}),
      };

      const res = await fetch(`\( {API_BASE} \){path}`, { ...options, headers });
      let data;
      try { data = await res.json(); } catch { data = {}; }

      if (!res.ok) {
        throw new Error(data.detail || data.message || `エラー (${res.status})`);
      }
      return data;
    }

    function renderListings(items) {
      els.loading.style.display = "none";
      els.list.style.display = "grid";

      if (!items?.length) {
        els.list.innerHTML = `<div class="item"><div class="body muted" style="padding:40px;text-align:center;">現在、公開売却中の作品はありません。</div></div>`;
        return;
      }

      els.list.innerHTML = items.map(item => `
        <div class="item">
          <div class="thumb">
            ${item.video_url
              ? `<video src="${item.video_url}" muted playsinline preload="metadata" controls></video>`
              : `<img src="\( {item.image_url || ''}" alt=" \){item.title || '作品'}" loading="lazy">`
            }
          </div>
          <div class="body">
            <div class="title">${item.title || '名称未設定'}</div>
            <div class="muted">
              作者: ${item.creator_name || '匿名'}<br>
              所有者: ${item.seller_user_id}<br>
              レア: \( {item.rarity} \){item.is_legend ? ' / LEGEND' : ''}<br>
              HP ${item.hp ?? '?'} / ATK ${item.atk ?? '?'} / DEF ${item.def ?? '?'}<br>
              Lv ${item.level ?? 1} / 総排出 ${item.draw_count ?? 0}回
            </div>
            <div class="price">${item.price_points.toLocaleString()} pt</div>
            <div class="muted" style="font-size:12px;margin-top:4px;">
              成立時：運営30% / 残り70%を所有者と著作権者で折半
            </div>
            <div class="buttons">
              <button class="btn-buy" 
                ${authUser && item.seller_user_id !== authUser.user_id ? '' : 'disabled'}
                onclick="buyItem(${item.listing_id}, ${item.price_points})">
                購入
              </button>
              <button class="btn-offer" 
                ${authUser && item.seller_user_id !== authUser.user_id ? '' : 'disabled'}
                onclick="offerItem(\( {item.work_id}, ' \){item.seller_user_id}')">
                オファー
              </button>
              \( {item.link_url ? `<a class="btn-link" href=" \){item.link_url}" target="_blank" rel="noopener noreferrer">作者リンク</a>` : ''}
            </div>
          </div>
        </div>
      `).join("");
    }

    async function loadListings() {
      try {
        const data = await api("/market/listings");
        renderListings(data.items || []);
      } catch (err) {
        showMessage("出品一覧の取得に失敗しました", true);
        els.loading.textContent = "読み込みに失敗しました…";
      }
    }

    async function buyItem(listingId, price) {
      if (!authUser?.user_id) {
        showMessage("購入するにはログインが必要です", true);
        return;
      }
      if ((authUser.points ?? 0) < price) {
        showMessage(`ポイントが不足しています（必要: ${price} pt）`, true);
        return;
      }

      if (!confirm(`この作品を${price.toLocaleString()}ptで購入しますか？`)) return;

      try {
        const res = await api("/market/buy", {
          method: "POST",
          body: JSON.stringify({
            buyer_user_id: authUser.user_id,
            listing_id: listingId
          })
        });
        showMessage(res.message || "購入が完了しました！");
        loadListings();
      } catch (err) {
        showMessage(err.message || "購入に失敗しました", true);
      }
    }

    async function offerItem(workId, sellerId) {
      if (!authUser?.user_id) {
        showMessage("オファーするにはログインが必要です", true);
        return;
      }
      if (sellerId === authUser.user_id) {
        showMessage("自分の出品にはオファーできません", true);
        return;
      }

      const input = prompt("オファー額 (pt)を入力してください", "100");
      if (!input) return;

      const points = Number(input);
      if (isNaN(points) || points <= 0) {
        showMessage("有効な数値を入力してください", true);
        return;
      }

      try {
        const res = await api("/offers", {
          method: "POST",
          body: JSON.stringify({
            from_user_id: authUser.user_id,
            to_user_id: sellerId,
            work_id: workId,
            offer_points: points
          })
        });
        showMessage(res.message || "オファーを送信しました");
      } catch (err) {
        showMessage(err.message || "オファーに失敗しました", true);
      }
    }

    window.buyItem = buyItem;
    window.offerItem = offerItem;

    function init() {
      authUser = getAuth();
      loadListings();
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
