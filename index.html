<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>美女ガチャクエスト</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(180deg, #0f0f12 0%, #151821 100%);
      color: #fff;
    }

    .container {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 18px 14px 40px;
    }

    .card {
      background: #1b1b1f;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    }

    h1, h2, h3, p { margin-top: 0; }

    .sub {
      color: #aeb5c2;
      font-size: 14px;
      line-height: 1.7;
    }

    .login-box,
    .status-box,
    .button-group,
    .nav-group {
      display: grid;
      gap: 10px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: #101218;
      color: #fff;
      font-size: 14px;
    }

    button,
    a.nav-btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    .btn-login { background: #2563eb; }
    .btn-logout { background: #374151; }
    .btn-free { background: #16a34a; }
    .btn-paid { background: #db2777; }
    .btn-link { background: #374151; }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .status-item {
      background: #101218;
      border-radius: 12px;
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .status-item span {
      display: block;
      font-size: 12px;
      color: #aeb5c2;
      margin-bottom: 6px;
    }

    .status-item strong {
      font-size: 18px;
    }

    .status-item.flash {
      transform: scale(1.04);
      border-color: rgba(74, 222, 128, 0.7);
      box-shadow: 0 0 0 2px rgba(74, 222, 128, 0.18), 0 10px 24px rgba(22, 163, 74, 0.18);
    }

    .stage {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 4;
      border-radius: 16px;
      background: #0b0d12;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 14px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .placeholder {
      color: #9ca3af;
      text-align: center;
      padding: 16px;
      line-height: 1.8;
      font-size: 14px;
    }

    .media {
      display: none;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .message {
      display: none;
      margin-top: 12px;
      background: #101218;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 12px;
      font-size: 13px;
      line-height: 1.7;
      color: #d1d5db;
    }

    .message.show {
      display: block;
    }

    .reward-notice {
      display: none;
      margin-top: 12px;
      background: rgba(22, 163, 74, 0.12);
      border: 1px solid rgba(74, 222, 128, 0.45);
      color: #86efac;
    }

    .reward-draw-btn {
      margin-top: 10px;
      background: #16a34a;
      color: #fff;
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .notice {
      color: #c4ccd7;
      font-size: 13px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="card">
      <h1>美女ガチャクエスト</h1>
      <p class="sub">投稿・ガチャ・所有・売買・バトルがつながる二次元特化ガチャサイト</p>

      <div class="login-box">
        <input id="userIdInput" placeholder
