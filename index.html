<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>無料AIガチャMAX R18</title>

  <meta name="description" content="無料でR18向けAI生成画像・動画をガチャ！あなたの作品も投稿可能。シェアでチケットGET！" />

  <link rel="stylesheet" href="style.css" />

  <style>
    .listing-full-box {
      margin-top: 10px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255, 120, 120, 0.12);
      border: 1px solid rgba(255, 120, 120, 0.28);
      color: #ffd7d7;
      font-size: 13px;
      line-height: 1.7;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="hero">
      <h1>無料AIガチャMAX R18</h1>

      <p class="sub">
        投稿されたR18向けAI作品がランダムで出る無料ガチャです。<br>
        あなたの作品も1点から追加できます。
      </p>

      <div class="adult-warning">
        このページは18歳以上向けです。
      </div>

      <p id="ticketInfo" class="mini-note">読み込み中...</p>

      <div class="buttons">
        <a class="btn btn-post" href="upload.html">作品を投稿する</a>
        <a class="btn btn-ranking" href="ranking.html">人気ランキング</a>
      </div>
    </div>

    <!-- ★ 自販機状況 -->
    <div id="machineStatusBox" class="notice-box">
      <strong>有料自販機の空き状況</strong><br>
      読み込み中...
    </div>

    <div class="gacha-card">

      <div id="stage" class="stage">
        <div id="placeholder" class="placeholder">
          ボタンを押すとランダムで作品が出ます
        </div>

        <img id="resultImage" class="media" style="display:none;" />
        <video id="resultVideo" class="media" autoplay loop muted style="display:none;"></video>
      </div>

      <button id="drawButton" class="draw-btn">ガチャを引く</button>

      <div id="meta" style="display:none;">

        <div><strong>タイトル:</strong> <span id="title"></span></div>
        <div><strong>作者:</strong> <span id="creator"></span></div>
        <div><strong>状態:</strong> <span id="status"></span></div>

        <!-- ★ 出品エリア -->
        <div id="listingArea" style="display:none; margin-top:12px;">

          <button id="listToMachineBtn" class="btn-like">
            この作品を自販機に出す
          </button>

          <div id="listingFullBox" class="listing-full-box" style="display:none;">
            <strong>現在、自販機が満杯です</strong><br>
            空きが出るまで出品できません。
          </div>

          <p id="listingMessage" class="mini-note"></p>

        </div>

      </div>
    </div>

    <div id="latestWorks" class="notice-box">
      新着作品 読み込み中...
    </div>

  </div>

  <script src="gacha.js"></script>
</body>
</html>
