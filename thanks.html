<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投稿ありがとうございました</title>

<style>

body{
  font-family:sans-serif;
  background:#111;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.card{
  background:#222;
  padding:50px 30px;
  border-radius:18px;
  text-align:center;
  max-width:420px;
  width:90%;
}

h2{
  font-size:34px;
  margin-bottom:16px;
}

p{
  font-size:22px;
  margin-bottom:30px;
  line-height:1.6;
}

.ticket{
  font-size:28px;
  color:#ff66cc;
  font-weight:bold;
}

a{
  display:inline-block;
  padding:20px 36px;
  background:#ff4081;
  color:white;
  text-decoration:none;
  border-radius:14px;
  font-size:22px;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="card">

<h2>投稿ありがとうございます！</h2>

<p>
<span class="ticket">ガチャチケット +1</span><br>
プレゼントしました
</p>

<a href="index.html">ガチャを引く</a>

</div>

<script>

const current =
parseInt(localStorage.getItem("gacha_ticket") || "0",10)

localStorage.setItem("gacha_ticket", current + 1)

</script>

</body>
</html>
