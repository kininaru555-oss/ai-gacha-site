<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投稿ありがとうございました</title>

<style>
body{
  font-family:sans-serif;
  background:linear-gradient(180deg, #120812 0%, #1a0d1a 100%);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
  padding:20px;
  box-sizing:border-box;
}

.card{
  background:#1f1f1f;
  padding:40px 24px;
  border-radius:18px;
  text-align:center;
  max-width:420px;
  width:100%;
  box-shadow:0 10px 30px rgba(0, 0, 0, 0.22);
}

h2{
  font-size:30px;
  margin:0 0 16px;
}

p{
  font-size:20px;
  margin:0 0 24px;
  line-height:1.6;
}

.ticket{
  font-size:28px;
  color:#ff66cc;
  font-weight:bold;
}

.note{
  font-size:13px;
  color:#bdbdbd;
  margin-bottom:24px;
}

a{
  display:inline-block;
  padding:16px 28px;
  background:#ff4081;
  color:white;
  text-decoration:none;
  border-radius:14px;
  font-size:20px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
  <h2>投稿ありがとうございます！</h2>

  <p>
    <span class="ticket">ガチャチケット +1</span><br>
    プレゼントしました
  </p>

  <div class="note">3秒後に自動でガチャ画面へ戻ります</div>

  <a href="index.html">ガチャを引く</a>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const reward = params.get("reward");

if (reward === "1") {
  const current = parseInt(localStorage.getItem("gacha_ticket") || "0", 10);
  localStorage.setItem("gacha_ticket", String(current + 1));
}

setTimeout(() => {
  window.location.href = "index.html";
}, 3000);
</script>

</body>
</html>
