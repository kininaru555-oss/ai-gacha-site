<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>投稿ありがとうございました | AIガチャ R18</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .thanks-wrap {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
      background: linear-gradient(to bottom, #0f0f0f, #1a1a1a);
    }

    .thanks-card {
      background: #1f1f1f;
      padding: 40px 24px;
      border-radius: 18px;
      text-align: center;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      border: 1px solid #333;
    }

    .thanks-card h2 {
      font-size: 32px;
      margin: 0 0 20px;
      color: #ff66cc;
    }

    .thanks-card p {
      font-size: 20px;
      margin: 0 0 28px;
      line-height: 1.6;
    }

    .ticket {
      font-size: 28px;
      color: #ff66cc;
      font-weight: bold;
      display: block;
      margin: 12px 0;
    }

    .note {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 28px;
      line-height: 1.7;
      white-space: pre-line;
    }

    .thanks-link {
      display: inline-block;
      padding: 16px 32px;
      background: linear-gradient(135deg, #ff4081, #d61f69);
      color: white;
      text-decoration: none;
      border-radius: 14px;
      font-size: 20px;
      font-weight: bold;
      transition: all 0.2s ease;
    }

    .thanks-link:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    .thanks-link:active {
      transform: scale(0.98);
    }

    .sub-note {
      margin-top: 12px;
      font-size: 13px;
      color: #cfcfcf;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="thanks-wrap">
    <div class="thanks-card">
      <h2>投稿ありがとうございます！🎉</h2>

      <p>
        あなたの作品を無事受け付けました。<br>
        <span class="ticket">投稿者無料モードを有効化しました</span>
      </p>

      <div id="rewardText" class="note">
        読み込み中...
      </div>

      <a class="thanks-link" href="index.html">今すぐガチャを引く</a>

      <div class="sub-note">
        4秒後に自動でガチャ画面に戻ります。
      </div>
    </div>
  </div>

  <script>
    const POINT_API_BASE = "/api/points";

    function getOrCreateUserId() {
      let userId = localStorage.getItem("gacha_user_id");

      if (!userId) {
        if (window.crypto && typeof window.crypto.randomUUID === "function") {
          userId = "user_" + window.crypto.randomUUID();
        } else {
          userId = "user_" + Date.now() + "_" + Math.floor(Math.random() * 1000000);
        }
        localStorage.setItem("gacha_user_id", userId);
      }

      return userId;
    }

    async function addPostRewardPoints(userId, amount) {
      try {
        const response = await fetch(
          `${POINT_API_BASE}/${encodeURIComponent(userId)}/add?amount=${amount}&note=${encodeURIComponent("作品投稿報酬")}`,
          { method: "POST" }
        );

        if (!response.ok) {
          throw new Error("ポイント付与失敗");
        }

        const data = await response.json();
        return data.user || null;
      } catch (error) {
        console.error(error);
        return null;
      }
    }

    async function initThanksPage() {
      const params = new URLSearchParams(window.location.search);
      const reward = params.get("reward");
      const rewardText = document.getElementById("rewardText");

      const userId = getOrCreateUserId();

      localStorage.setItem("gacha_is_poster_free", "1");

      let message = "投稿者は無料でガチャを引けます。";

      if (reward === "1") {
        const user = await addPostRewardPoints(userId, 30);

        if (user) {
          message =
            `投稿者無料モードを有効化し、投稿報酬として30ポイント付与しました。\n現在の所持ポイント: ${user.points || 0}pt`;
        } else {
          message = "投稿者無料モードを有効化しました。ポイント付与は確認できませんでした。";
        }
      }

      if (rewardText) {
        rewardText.textContent = message;
      }

      setTimeout(() => {
        window.location.href = "index.html";
      }, 4000);
    }

    initThanksPage();
  </script>
</body>
</html>
